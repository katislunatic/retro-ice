<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice – Create Skater</title>
<link rel="stylesheet" href="css/style.css">
<style>
.rink-bg-full{position:fixed;inset:0;background:linear-gradient(180deg,#08111e 0%,#0d1c36 20%,#1a3050 28%,#c0eaf8 28%,#d8f4ff 55%,#b0e0f2 100%);z-index:-2;}

.create-page {
  width:100vw;height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(12px,2.5vw,32px);
  padding:16px;
  overflow:hidden;
}

/* LEFT: preview */
.preview-col {
  flex:0 0 auto;
  display:flex;flex-direction:column;
  align-items:center;
  gap:14px;
}

.preview-box {
  background:rgba(10,25,50,0.8);
  border:3px solid var(--border-col);
  box-shadow:0 0 0 2px #0a1020,0 0 0 4px var(--border-col),4px 4px 0 rgba(0,0,0,.5);
  padding:10px;
  position:relative;
}
.preview-box canvas { display:block; image-rendering:pixelated; }

.gender-row { display:flex;gap:10px;width:100%;max-width:200px; }
.gender-row .btn { flex:1;font-size:clamp(6px,1vw,8px); }
.gender-row .btn.active { background:#1a6a2a;border-color:#40e060;color:#80ff90;box-shadow:0 4px 0 #0a3a10; }

/* RIGHT: form */
.form-col {
  flex:1;
  max-width:420px;
  min-width:220px;
  display:flex;
  flex-direction:column;
  gap:0;
}

.header-row {
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.header-row h2 { font-size:clamp(8px,1.4vw,12px);color:#fff;text-shadow:2px 2px 0 var(--ice-dark); }

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 14px;
  margin-bottom:14px;
}

.swatch-row { margin-bottom:12px; }
.swatch-label { font-size:clamp(5px,0.8vw,7px);color:var(--text-acc);letter-spacing:1px;margin-bottom:5px; }
.swatch-grid { display:flex;flex-wrap:wrap;gap:5px; }
.swatch {
  width:clamp(20px,2.5vw,26px);
  height:clamp(20px,2.5vw,26px);
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;
  transition:border-color .1s,transform .1s;
}
.swatch:hover { transform:scale(1.15); }
.swatch.active { border-color:#fff;box-shadow:0 0 0 2px var(--text-gold); }

/* Nation picker */
.nation-row {
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.92);
  border:3px solid var(--border-col);
  padding:6px 10px;
  cursor:pointer;
  position:relative;
}
.nation-row span { font-size:clamp(7px,1.1vw,9px);color:#0a1428;font-family:'Press Start 2P',monospace; }
.nation-row .arrow { margin-left:auto;color:#0a1428;font-size:10px; }

.nation-dropdown {
  display:none;
  position:absolute;
  top:100%;left:0;right:0;
  background:#0d1e38;
  border:2px solid var(--border-col);
  max-height:140px;
  overflow-y:auto;
  z-index:50;
}
.nation-dropdown.open { display:block; }
.nation-opt {
  padding:7px 10px;
  font-size:clamp(6px,1vw,8px);
  color:#cde;
  cursor:pointer;
  font-family:'Press Start 2P',monospace;
}
.nation-opt:hover { background:#1a3a5c;color:#fff; }
.nation-opt.selected { color:var(--text-gold); }

/* Bottom actions */
.action-row {
  display:flex;gap:10px;margin-top:14px;
}
.action-row .btn { flex:1; }
</style>
</head>
<body>
<div class="rink-bg-full"></div>

<div class="create-page fadeup">

  <!-- PREVIEW -->
  <div class="preview-col">
    <div class="preview-box" style="background:linear-gradient(180deg,#a8dcf0,#c8eef8)">
      <canvas id="previewCanvas" width="80" height="120"
        style="width:clamp(80px,10vw,120px);height:auto"></canvas>
    </div>

    <div class="gender-row">
      <button class="btn active" id="btnMale"   onclick="setGender('male')">MALE</button>
      <button class="btn"        id="btnFemale"  onclick="setGender('female')">FEMALE</button>
    </div>

    <div class="swatch-row" style="text-align:center">
      <div class="swatch-label">SKIN</div>
      <div class="swatch-grid" id="skinSwatches"></div>
    </div>
    <div class="swatch-row" style="text-align:center">
      <div class="swatch-label">HAIR</div>
      <div class="swatch-grid" id="hairSwatches"></div>
    </div>
    <div class="swatch-row" style="text-align:center">
      <div class="swatch-label">OUTFIT</div>
      <div class="swatch-grid" id="outfitSwatches"></div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-col">
    <div class="header-row">
      <button class="btn btn-sm" style="width:34px;height:34px;padding:0" onclick="location.href='career.html'">◀</button>
      <div style="display:flex;gap:4px;font-size:10px">
        <span class="star-r">★</span><span class="star-w">★</span><span class="star-b">★</span>
      </div>
      <h2>NEW CAREER</h2>
      <div style="display:flex;gap:4px;font-size:10px">
        <span class="star-b">★</span><span class="star-w">★</span><span class="star-r">★</span>
      </div>
    </div>

    <div class="panel" style="padding:14px 18px">
      <p class="section-title" style="margin-bottom:12px">YOUR NAME</p>
      <div class="form-grid">
        <div>
          <div class="field-label">FIRST NAME</div>
          <input type="text" id="firstName" value="ALEX" maxlength="10">
        </div>
        <div>
          <div class="field-label">LAST NAME</div>
          <input type="text" id="lastName" value="FROST" maxlength="12">
        </div>
      </div>

      <div style="margin-bottom:14px">
        <div class="field-label">NATION</div>
        <div class="nation-row" id="nationRow" onclick="toggleNation()">
          <span id="nationFlag">🇺🇸</span>
          <span id="nationName">USA</span>
          <span class="arrow">▼</span>
          <div class="nation-dropdown" id="nationDropdown"></div>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-sm" onclick="randomize()">🎲 RANDOM</button>
      <button class="btn btn-gold" onclick="startCareer()">PLAY ▶</button>
    </div>
  </div>
</div>

<script src="js/save.js"></script>
<script>
// ── Data ───────────────────────────────────────────────
const SKIN_COLORS = [
  '#fde8c0','#f4c77c','#d4956a','#b0713a','#7a4420','#4a2510'
];
const HAIR_COLORS = [
  '#f8e060','#e0a030','#b06020','#7a3a10','#3a1808','#1a1010',
  '#aabbcc','#e88090','#60c0a0','#8060d0'
];
const OUTFIT_COLORS = [
  '#e03050','#4060e0','#208040','#c0a020','#c050c0','#2090a0',
  '#e06020','#204060','#ffffff','#202020'
];
const NATIONS = [
  {code:'USA',flag:'🇺🇸'},{code:'CAN',flag:'🇨🇦'},{code:'RUS',flag:'🇷🇺'},
  {code:'JPN',flag:'🇯🇵'},{code:'CHN',flag:'🇨🇳'},{code:'KOR',flag:'🇰🇷'},
  {code:'FRA',flag:'🇫🇷'},{code:'GER',flag:'🇩🇪'},{code:'ITA',flag:'🇮🇹'},
  {code:'GBR',flag:'🇬🇧'},{code:'AUS',flag:'🇦🇺'},{code:'SWE',flag:'🇸🇪'},
  {code:'FIN',flag:'🇫🇮'},{code:'NOR',flag:'🇳🇴'},{code:'ESP',flag:'🇪🇸'},
];
const MALE_FIRST   = ['ALEX','RYAN','JAKE','COLE','MAX','LUCAS','DEREK','SEAN','KYLE','EVAN'];
const FEMALE_FIRST = ['EMMA','AVA','LILY','ZOE','CHLOE','MADISON','SOPHIA','OLIVIA','GRACE','KATE'];
const LAST_NAMES   = ['FROST','SNOW','WINTERS','ICE','STEELE','BLAKE','CROSS','STONE','WADE','BROOKS'];

let skater = {
  gender: 'male',
  skin: 1,
  hair: 4,
  outfit: 0,
  nation: 'USA',
  nationFlag: '🇺🇸',
  firstName: 'ALEX',
  lastName: 'FROST',
};

// ── Build swatches ─────────────────────────────────────
function buildSwatches(id, colors, key) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  colors.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (skater[key]===i?' active':'');
    s.style.background = c;
    s.addEventListener('click', ()=>{
      skater[key] = i;
      el.querySelectorAll('.swatch').forEach((x,j)=>x.classList.toggle('active',j===i));
      renderPreview();
    });
    el.appendChild(s);
  });
}

function initSwatches() {
  buildSwatches('skinSwatches',  SKIN_COLORS,   'skin');
  buildSwatches('hairSwatches',  HAIR_COLORS,   'hair');
  buildSwatches('outfitSwatches',OUTFIT_COLORS, 'outfit');
}

// ── Nation dropdown ────────────────────────────────────
function buildNationDropdown() {
  const dd = document.getElementById('nationDropdown');
  dd.innerHTML = '';
  NATIONS.forEach(n => {
    const opt = document.createElement('div');
    opt.className = 'nation-opt' + (n.code===skater.nation?' selected':'');
    opt.textContent = `${n.flag} ${n.code}`;
    opt.addEventListener('click', e => {
      e.stopPropagation();
      skater.nation = n.code;
      skater.nationFlag = n.flag;
      document.getElementById('nationFlag').textContent = n.flag;
      document.getElementById('nationName').textContent = n.code;
      dd.querySelectorAll('.nation-opt').forEach((x,j)=>x.classList.toggle('selected',NATIONS[j].code===n.code));
      toggleNation();
    });
    dd.appendChild(opt);
  });
}

let nationOpen = false;
function toggleNation(){
  nationOpen = !nationOpen;
  document.getElementById('nationDropdown').classList.toggle('open', nationOpen);
}
document.addEventListener('click', e=>{
  if(!document.getElementById('nationRow').contains(e.target)){
    nationOpen=false;
    document.getElementById('nationDropdown').classList.remove('open');
  }
});

// ── Gender ─────────────────────────────────────────────
function setGender(g){
  skater.gender = g;
  document.getElementById('btnMale').classList.toggle('active', g==='male');
  document.getElementById('btnFemale').classList.toggle('active', g==='female');
  renderPreview();
}

// ── Random ─────────────────────────────────────────────
function randomize(){
  const g = Math.random()<0.5?'male':'female';
  skater.gender = g;
  skater.skin   = Math.floor(Math.random()*SKIN_COLORS.length);
  skater.hair   = Math.floor(Math.random()*HAIR_COLORS.length);
  skater.outfit = Math.floor(Math.random()*OUTFIT_COLORS.length);
  const nat = NATIONS[Math.floor(Math.random()*NATIONS.length)];
  skater.nation = nat.code; skater.nationFlag = nat.flag;
  const fn = g==='male'
    ? MALE_FIRST[Math.floor(Math.random()*MALE_FIRST.length)]
    : FEMALE_FIRST[Math.floor(Math.random()*FEMALE_FIRST.length)];
  const ln = LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)];
  document.getElementById('firstName').value = fn;
  document.getElementById('lastName').value  = ln;
  document.getElementById('nationFlag').textContent = nat.flag;
  document.getElementById('nationName').textContent = nat.code;
  document.getElementById('btnMale').classList.toggle('active', g==='male');
  document.getElementById('btnFemale').classList.toggle('active', g==='female');
  initSwatches();
  buildNationDropdown();
  renderPreview();
}

// ── Preview canvas ─────────────────────────────────────
const pc = document.getElementById('previewCanvas');
const px = pc.getContext('2d');
px.imageSmoothingEnabled = false;

function renderPreview(){
  px.clearRect(0,0,80,120);
  const skin   = SKIN_COLORS[skater.skin];
  const hair   = HAIR_COLORS[skater.hair];
  const outfit = OUTFIT_COLORS[skater.outfit];
  const male   = skater.gender==='male';

  // Shadow
  px.fillStyle='rgba(30,80,120,0.2)';
  px.fillRect(22,112,36,5);

  if(male){
    // Pants / legs
    px.fillStyle='#1a2a4a';
    px.fillRect(28,88,10,22); px.fillRect(42,88,10,22);
    // Body
    px.fillStyle=outfit;
    px.fillRect(25,58,30,32);
    // Arms
    px.fillStyle=outfit;
    px.fillRect(12,60,13,7); px.fillRect(55,60,13,7);
    // Gloves
    px.fillStyle='#fff';
    px.fillRect(9,60,6,6); px.fillRect(65,60,6,6);
    // Head
    px.fillStyle=skin;
    px.fillRect(29,38,22,22);
    // Hair
    px.fillStyle=hair;
    px.fillRect(29,36,22,8);
    // Eyes
    px.fillStyle='#1a0a00';
    px.fillRect(33,45,4,4); px.fillRect(43,45,4,4);
    // Boots
    px.fillStyle='#fff';
    px.fillRect(26,108,14,6); px.fillRect(40,108,14,6);
    // Blades
    px.fillStyle='rgba(190,220,255,0.9)';
    px.fillRect(24,114,18,2); px.fillRect(38,114,18,2);
  } else {
    // Skirt
    px.fillStyle=outfit;
    px.fillRect(22,88,36,14);
    // Legs
    px.fillStyle=skin;
    px.fillRect(28,100,10,16); px.fillRect(42,100,10,16);
    // Body
    px.fillStyle=outfit;
    px.fillRect(25,58,30,32);
    // Arms
    px.fillStyle=outfit;
    px.fillRect(10,62,15,7); px.fillRect(55,62,15,7);
    // Gloves
    px.fillStyle='#fff';
    px.fillRect(7,62,6,6); px.fillRect(67,62,6,6);
    // Head
    px.fillStyle=skin;
    px.fillRect(29,38,22,22);
    // Hair (longer for female)
    px.fillStyle=hair;
    px.fillRect(29,34,22,10);
    px.fillRect(27,44,4,16); // side hair
    px.fillRect(49,44,4,16);
    // Eyes
    px.fillStyle='#1a0a00';
    px.fillRect(33,45,4,4); px.fillRect(43,45,4,4);
    // Boots
    px.fillStyle='#fff';
    px.fillRect(26,114,14,6); px.fillRect(40,114,14,6);
    // Blades
    px.fillStyle='rgba(190,220,255,0.9)';
    px.fillRect(24,120,18,2); px.fillRect(38,120,18,2);
  }
}

// ── Start ──────────────────────────────────────────────
function startCareer(){
  const fn = document.getElementById('firstName').value.trim().toUpperCase() || 'ALEX';
  const ln = document.getElementById('lastName').value.trim().toUpperCase()  || 'FROST';
  const slot = parseInt(sessionStorage.getItem('activeSlot')||'1');

  SaveSystem.newSave(slot, {
    firstName: fn,
    lastName:  ln,
    nation:    skater.nation,
    nationFlag:skater.nationFlag,
    gender:    skater.gender,
    skin:      skater.skin,
    hair:      skater.hair,
    outfit:    skater.outfit,
  });

  location.href = 'game.html';
}

// ── Init ───────────────────────────────────────────────
initSwatches();
buildNationDropdown();
renderPreview();
</script>
</body>
</html>
