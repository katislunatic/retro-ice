<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice – New Career</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Green halftone bg like RST */
body { background: #4aaa20; overflow: hidden; }
.halftone {
  position:fixed;inset:0;z-index:0;
  background-image:radial-gradient(circle,rgba(0,0,0,0.13) 1.5px,transparent 1.5px);
  background-size:12px 12px;pointer-events:none;
}
.vignette {
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,0.4) 100%);
  pointer-events:none;
}

.create-page {
  position:relative;z-index:1;
  width:100vw;height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(12px,3vw,40px);
  padding:16px;
}

/* ── LEFT: preview portrait, gender, swatches ── */
.left-col {
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* Portrait card exactly like Retro Slam Tennis character card */
.portrait-card {
  background:#a8e060;
  border:4px solid rgba(255,255,255,0.9);
  box-shadow:0 6px 0 rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,255,255,0.2);
  padding:8px;
  position:relative;
}
.portrait-card canvas {
  display:block;
  image-rendering:pixelated;
}

/* Gender buttons */
.gender-row {
  display:flex;gap:8px;
  width:100%;
}
.gender-row button {
  flex:1;
  background:rgba(30,80,10,0.65);
  border:3px solid rgba(255,255,255,0.75);
  box-shadow:0 4px 0 rgba(0,0,0,0.35);
  color:#fff;
  font-family:var(--font);
  font-size:clamp(6px,1vw,8px);
  padding:8px 4px;
  cursor:pointer;
  letter-spacing:1px;
  transition:background 0.07s;
}
.gender-row button:hover  { background:rgba(50,110,20,0.85); }
.gender-row button:active { transform:translateY(3px); }
.gender-row button.active {
  background:#1a7020;
  border-color:#80ff80;
  box-shadow:0 4px 0 #0a4010;
  color:#90ff90;
}

/* Swatch section */
.swatch-section { width:100%; }
.swatch-lbl {
  font-size:clamp(5px,0.75vw,6px);
  color:rgba(255,255,255,0.75);
  letter-spacing:2px;
  text-align:center;
  margin-bottom:5px;
}
.swatch-row {
  display:flex;flex-wrap:wrap;
  gap:4px;
  justify-content:center;
}

/* ── RIGHT: name/nation form + action buttons ── */
.right-col {
  flex:1;
  max-width:420px;
  min-width:220px;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* Header */
.create-header {
  display:flex;align-items:center;gap:10px;
  margin-bottom:clamp(10px,1.8vh,16px);
}
.create-header h2 {
  flex:1;
  font-size:clamp(8px,1.4vw,12px);
  color:#fff;
  letter-spacing:3px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.6);
  text-align:center;
}
.create-header .stars {display:flex;gap:4px;font-size:8px;}

/* Form panel — dark green card */
.form-card {
  background:rgba(15,50,5,0.82);
  border:4px solid rgba(255,255,255,0.8);
  box-shadow:0 6px 0 rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,255,255,0.12);
  padding:16px 18px;
}

.form-section-title {
  font-size:clamp(5px,0.8vw,7px);
  color:rgba(255,255,255,0.5);
  letter-spacing:3px;
  text-align:center;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}

.name-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.nation-field { margin-bottom:0; }

/* ── Action row ── */
.action-row {
  display:flex;
  gap:10px;
  margin-top:12px;
}
.action-row .random-btn {
  flex:1;
  background:rgba(30,80,10,0.75);
  border:3px solid rgba(255,255,255,0.75);
  box-shadow:0 4px 0 rgba(0,0,0,0.35);
  color:#fff;
  font-family:var(--font);
  font-size:clamp(6px,1vw,8px);
  padding:10px 8px;
  cursor:pointer;
  letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background 0.07s;
}
.action-row .random-btn:hover  { background:rgba(50,110,20,0.9); }
.action-row .random-btn:active { transform:translateY(3px); }

.action-row .play-btn {
  flex:2;
  background:#b08000;
  border:3px solid rgba(255,255,255,0.85);
  box-shadow:0 5px 0 #6a4800;
  color:#f8d030;
  font-family:var(--font);
  font-size:clamp(8px,1.3vw,11px);
  padding:10px 14px;
  cursor:pointer;
  letter-spacing:2px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.07s;
}
.action-row .play-btn:hover  { background:#c89010; }
.action-row .play-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #6a4800; }
</style>
</head>
<body>

<div class="halftone"></div>
<div class="vignette"></div>

<div class="create-page fadein">

  <!-- LEFT: Preview + customization -->
  <div class="left-col">
    <div class="portrait-card">
      <canvas id="previewCanvas" width="80" height="110"
        style="width:clamp(80px,11vw,130px);height:auto"></canvas>
    </div>

    <div class="gender-row">
      <button id="btnMale"   class="active" onclick="setGender('male')">MALE</button>
      <button id="btnFemale"             onclick="setGender('female')">FEMALE</button>
    </div>

    <div class="swatch-section">
      <div class="swatch-lbl">SKIN</div>
      <div class="swatch-row" id="skinSwatches"></div>
    </div>
    <div class="swatch-section">
      <div class="swatch-lbl">HAIR</div>
      <div class="swatch-row" id="hairSwatches"></div>
    </div>
    <div class="swatch-section">
      <div class="swatch-lbl">OUTFIT</div>
      <div class="swatch-row" id="outfitSwatches"></div>
    </div>
  </div>

  <!-- RIGHT: Form -->
  <div class="right-col">
    <div class="create-header">
      <button class="rst-btn" style="padding:8px 10px;font-size:10px" onclick="location.href='career.html'">◀</button>
      <div class="stars"><span class="st-r">★</span><span class="st-w">★</span><span class="st-b">★</span></div>
      <h2>NEW CAREER</h2>
      <div class="stars"><span class="st-b">★</span><span class="st-w">★</span><span class="st-r">★</span></div>
      <div style="width:44px"></div>
    </div>

    <div class="form-card">
      <div class="form-section-title">YOUR NAME</div>
      <div class="name-grid">
        <div>
          <div class="rb-input-label">FIRST NAME</div>
          <input type="text" id="firstName" value="ALEX" maxlength="10">
        </div>
        <div>
          <div class="rb-input-label">LAST NAME</div>
          <input type="text" id="lastName" value="FROST" maxlength="12">
        </div>
      </div>
      <div class="nation-field">
        <div class="rb-input-label">NATION</div>
        <select id="nationSelect" onchange="onNationChange()"></select>
      </div>
    </div>

    <div class="action-row">
      <button class="random-btn" onclick="randomize()">● RANDOM</button>
      <button class="play-btn"   onclick="startCareer()">PLAY ▶</button>
    </div>
  </div>
</div>

<script src="js/save.js"></script>
<script>
// ── Data ─────────────────────────────────────────────────
const SKINS   = ['#fde8c0','#f4c77c','#d4956a','#b0713a','#7a4420','#4a2510'];
const HAIRS   = ['#f8e060','#e0a030','#b06020','#7a3a10','#3a1808','#1a1010','#aabbcc','#e88090','#60c0a0','#8060d0'];
const OUTFITS = ['#e03050','#4060e0','#208040','#c0a020','#c050c0','#2090a0','#e06020','#204060','#f0f0f0','#202020'];
const NATIONS = [
  {code:'USA',flag:'🇺🇸'},{code:'CAN',flag:'🇨🇦'},{code:'RUS',flag:'🇷🇺'},
  {code:'JPN',flag:'🇯🇵'},{code:'CHN',flag:'🇨🇳'},{code:'KOR',flag:'🇰🇷'},
  {code:'FRA',flag:'🇫🇷'},{code:'GER',flag:'🇩🇪'},{code:'ITA',flag:'🇮🇹'},
  {code:'GBR',flag:'🇬🇧'},{code:'AUS',flag:'🇦🇺'},{code:'SWE',flag:'🇸🇪'},
  {code:'FIN',flag:'🇫🇮'},{code:'NOR',flag:'🇳🇴'},{code:'ESP',flag:'🇪🇸'},
];
const MALE_FIRST   = ['ALEX','RYAN','JAKE','COLE','MAX','LUCAS','DEREK','EVAN','KYLE','SEAN'];
const FEMALE_FIRST = ['EMMA','AVA','LILY','ZOE','CHLOE','MADISON','SOPHIA','OLIVIA','GRACE','KATE'];
const LAST_NAMES   = ['FROST','SNOW','WINTERS','ICE','STEELE','BLAKE','CROSS','STONE','WADE','BROOKS'];

let sk = { gender:'male', skin:0, hair:4, outfit:0, nation:'USA', nationFlag:'🇺🇸' };

// Build nation select
function buildNations(){
  const sel = document.getElementById('nationSelect');
  NATIONS.forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n.code;
    opt.textContent = `${n.flag} ${n.code}`;
    sel.appendChild(opt);
  });
}
function onNationChange(){
  const sel = document.getElementById('nationSelect');
  sk.nation = sel.value;
  const n = NATIONS.find(x=>x.code===sel.value);
  sk.nationFlag = n?.flag||'🏳';
}

// Swatches
function buildSwatches(id, colors, key){
  const el = document.getElementById(id);
  el.innerHTML='';
  colors.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='swatch'+(sk[key]===i?' active':'');
    s.style.background=c;
    s.addEventListener('click',()=>{
      sk[key]=i;
      el.querySelectorAll('.swatch').forEach((x,j)=>x.classList.toggle('active',j===i));
      renderPreview();
    });
    el.appendChild(s);
  });
}

function buildAll(){ buildSwatches('skinSwatches',SKINS,'skin'); buildSwatches('hairSwatches',HAIRS,'hair'); buildSwatches('outfitSwatches',OUTFITS,'outfit'); }

// Gender
function setGender(g){
  sk.gender=g;
  document.getElementById('btnMale').classList.toggle('active',g==='male');
  document.getElementById('btnFemale').classList.toggle('active',g==='female');
  renderPreview();
}

// Random
function randomize(){
  const g=Math.random()<0.5?'male':'female';
  sk.gender=g;
  sk.skin=Math.floor(Math.random()*SKINS.length);
  sk.hair=Math.floor(Math.random()*HAIRS.length);
  sk.outfit=Math.floor(Math.random()*OUTFITS.length);
  const nat=NATIONS[Math.floor(Math.random()*NATIONS.length)];
  sk.nation=nat.code; sk.nationFlag=nat.flag;
  const fn=(g==='male'?MALE_FIRST:FEMALE_FIRST)[Math.floor(Math.random()*10)];
  const ln=LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)];
  document.getElementById('firstName').value=fn;
  document.getElementById('lastName').value=ln;
  document.getElementById('nationSelect').value=nat.code;
  document.getElementById('btnMale').classList.toggle('active',g==='male');
  document.getElementById('btnFemale').classList.toggle('active',g==='female');
  buildAll();
  renderPreview();
}

// ── Preview ──────────────────────────────────────────────
const pc=document.getElementById('previewCanvas');
const px=pc.getContext('2d');
px.imageSmoothingEnabled=false;

function renderPreview(){
  px.clearRect(0,0,80,110);
  const skin=SKINS[sk.skin], hair=HAIRS[sk.hair], outfit=OUTFITS[sk.outfit];
  const f=sk.gender==='female';

  // Shadow
  px.fillStyle='rgba(60,140,30,0.3)';
  px.fillRect(22,102,36,5);

  if(f){
    // Female skater
    // Legs
    px.fillStyle=skin; px.fillRect(28,84,8,16); px.fillRect(44,84,8,16);
    // Skirt
    px.fillStyle=outfit; px.fillRect(22,76,36,10);
    // Body
    px.fillStyle=outfit; px.fillRect(24,52,32,26);
    // Arms
    px.fillStyle=outfit; px.fillRect(10,56,14,6); px.fillRect(56,56,14,6);
    px.fillStyle='#fff'; px.fillRect(7,56,6,5); px.fillRect(67,56,6,5);
    // Head
    px.fillStyle=skin; px.fillRect(29,34,22,20);
    // Hair
    px.fillStyle=hair; px.fillRect(29,30,22,8); px.fillRect(27,38,4,16); px.fillRect(49,38,4,16);
    // Eyes
    px.fillStyle='rgba(0,0,0,0.7)'; px.fillRect(33,41,3,3); px.fillRect(44,41,3,3);
    // Boots
    px.fillStyle='#f0f0f8'; px.fillRect(26,100,12,6); px.fillRect(42,100,12,6);
    // Blades
    px.fillStyle='rgba(190,220,255,0.9)'; px.fillRect(24,106,16,2); px.fillRect(40,106,16,2);
  } else {
    // Male skater
    // Pants
    px.fillStyle='#1a2050'; px.fillRect(26,72,13,26); px.fillRect(42,72,13,26);
    // Body
    px.fillStyle=outfit; px.fillRect(24,48,32,26);
    // Arms
    px.fillStyle=outfit; px.fillRect(10,52,14,7); px.fillRect(56,52,14,7);
    px.fillStyle='#fff'; px.fillRect(7,53,5,5); px.fillRect(68,53,5,5);
    // Head
    px.fillStyle=skin; px.fillRect(29,28,22,22);
    // Hair
    px.fillStyle=hair; px.fillRect(29,24,22,8);
    // Eyes
    px.fillStyle='rgba(0,0,0,0.7)'; px.fillRect(33,35,3,3); px.fillRect(44,35,3,3);
    // Boots
    px.fillStyle='#f0f0f8'; px.fillRect(24,98,14,6); px.fillRect(42,98,14,6);
    // Blades
    px.fillStyle='rgba(190,220,255,0.9)'; px.fillRect(22,104,18,2); px.fillRect(40,104,18,2);
  }
}

// Start career
function startCareer(){
  const fn=document.getElementById('firstName').value.trim().toUpperCase()||'ALEX';
  const ln=document.getElementById('lastName').value.trim().toUpperCase()||'FROST';
  const slot=parseInt(sessionStorage.getItem('activeSlot')||'1');
  SaveSystem.newSave(slot,{
    firstName:fn, lastName:ln,
    nation:sk.nation, nationFlag:sk.nationFlag,
    gender:sk.gender, skin:sk.skin, hair:sk.hair, outfit:sk.outfit,
  });
  location.href='game.html';
}

// Init
buildNations();
buildAll();
renderPreview();
</script>
</body>
</html>
