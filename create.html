<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice – New Career</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: #3a9818; overflow: hidden; }
.halftone { position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(0,0,0,0.18) 1.5px,transparent 1.5px);background-size:11px 11px;pointer-events:none; }
.vignette  { position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(0,0,0,0.48) 100%);pointer-events:none; }

.create-page {
  position:relative;z-index:1;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(14px,3vw,44px);padding:18px;
}

/* ── LEFT: portrait + controls ── */
.left-col {
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}

/* Portrait card — RST style: solid colored bg, white border */
.portrait-card {
  background: #7ec838;
  border: 4px solid rgba(255,255,255,0.92);
  box-shadow: 0 7px 0 rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,255,255,0.18);
  padding: 6px 8px 4px;
}
.portrait-card canvas {
  display: block; image-rendering: pixelated;
  width: clamp(88px,12vw,140px); height: auto;
}

/* Gender toggle */
.gender-row { display:flex;gap:8px;width:100%; }
.gender-row button {
  flex:1;
  background:rgba(18,60,6,0.72);
  border:3px solid rgba(255,255,255,0.72);
  box-shadow:0 4px 0 rgba(0,0,0,0.4);
  color:#fff;font-family:var(--font);
  font-size:clamp(6px,0.9vw,8px);
  padding:8px 4px;cursor:pointer;letter-spacing:1px;transition:background 0.07s;
}
.gender-row button:hover  { background:rgba(38,88,14,0.9); }
.gender-row button:active { transform:translateY(3px); }
.gender-row button.active { background:#1a7020;border-color:#80ff80;box-shadow:0 4px 0 #0a3a12;color:#90ff90; }

/* Swatch sections */
.sw-section { width:100%; }
.sw-lbl { font-size:clamp(5px,0.72vw,6px);color:rgba(255,255,255,0.72);letter-spacing:2px;text-align:center;margin-bottom:4px; }
.sw-row { display:flex;flex-wrap:wrap;gap:4px;justify-content:center; }

/* ── RIGHT: form ── */
.right-col { flex:1;max-width:430px;min-width:220px;display:flex;flex-direction:column;gap:0; }

.create-hdr { display:flex;align-items:center;gap:10px;margin-bottom:clamp(10px,1.8vh,16px); }
.create-hdr h2 { flex:1;font-size:clamp(8px,1.4vw,12px);color:#fff;letter-spacing:3px;text-shadow:2px 2px 0 rgba(0,0,0,0.55);text-align:center; }
.create-hdr .stars { display:flex;gap:4px;font-size:8px; }

/* Form card */
.form-card {
  background:rgba(10,40,4,0.84);
  border:4px solid rgba(255,255,255,0.8);
  box-shadow:0 6px 0 rgba(0,0,0,0.4),inset 0 0 0 2px rgba(255,255,255,0.1);
  padding:16px 18px;
}
.form-sec-title {
  font-size:clamp(5px,0.78vw,7px);
  color:rgba(255,255,255,0.48);letter-spacing:3px;text-align:center;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,0.14);
}
.name-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px; }

/* Action row */
.action-row { display:flex;gap:10px;margin-top:12px; }
.rand-btn {
  flex:1;
  background:rgba(18,60,6,0.75);
  border:3px solid rgba(255,255,255,0.72);
  box-shadow:0 4px 0 rgba(0,0,0,0.4);
  color:#fff;font-family:var(--font);
  font-size:clamp(6px,0.9vw,8px);padding:10px 8px;cursor:pointer;
  letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background 0.07s;
}
.rand-btn:hover  { background:rgba(40,96,14,0.9); }
.rand-btn:active { transform:translateY(3px); }
.play-btn2 {
  flex:2;
  background:linear-gradient(180deg,#d4a010 0%,#a87800 100%);
  border:3px solid rgba(255,255,255,0.88);
  box-shadow:0 5px 0 #5e4000;
  color:#f8e040;font-family:var(--font);
  font-size:clamp(9px,1.3vw,12px);padding:10px 14px;cursor:pointer;
  letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.07s;
}
.play-btn2:hover  { background:linear-gradient(180deg,#e8c020 0%,#c09010 100%); }
.play-btn2:active { transform:translateY(4px);box-shadow:0 1px 0 #5e4000; }
</style>
</head>
<body>
<div class="halftone"></div>
<div class="vignette"></div>

<div class="create-page fadein">

  <!-- LEFT -->
  <div class="left-col">
    <div class="portrait-card">
      <canvas id="previewCanvas" width="80" height="110"></canvas>
    </div>
    <div class="gender-row">
      <button id="btnMale"   class="active" onclick="setGender('male')">MALE</button>
      <button id="btnFemale"                onclick="setGender('female')">FEMALE</button>
    </div>
    <div class="sw-section">
      <div class="sw-lbl">SKIN</div>
      <div class="sw-row" id="skinSw"></div>
    </div>
    <div class="sw-section">
      <div class="sw-lbl">HAIR</div>
      <div class="sw-row" id="hairSw"></div>
    </div>
    <div class="sw-section">
      <div class="sw-lbl">OUTFIT</div>
      <div class="sw-row" id="outfitSw"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-col">
    <div class="create-hdr">
      <button class="rst-btn" style="padding:8px 10px;font-size:10px" onclick="location.href='career.html'">◀</button>
      <div class="stars"><span class="st-r">★</span><span class="st-w">★</span><span class="st-b">★</span></div>
      <h2>NEW CAREER</h2>
      <div class="stars"><span class="st-b">★</span><span class="st-w">★</span><span class="st-r">★</span></div>
      <div style="width:44px"></div>
    </div>
    <div class="form-card">
      <div class="form-sec-title">YOUR NAME</div>
      <div class="name-grid">
        <div>
          <div class="rb-input-label">FIRST NAME</div>
          <input type="text" id="firstName" value="ALEX" maxlength="10">
        </div>
        <div>
          <div class="rb-input-label">LAST NAME</div>
          <input type="text" id="lastName" value="FROST" maxlength="12">
        </div>
      </div>
      <div>
        <div class="rb-input-label">NATION</div>
        <select id="nationSelect" onchange="onNation()"></select>
      </div>
    </div>
    <div class="action-row">
      <button class="rand-btn"  onclick="randomize()">● RANDOM</button>
      <button class="play-btn2" onclick="startCareer()">PLAY ▶</button>
    </div>
  </div>
</div>

<script src="js/save.js"></script>
<script>
// ── Data ─────────────────────────────────────────────────
const SKINS   = ['#fde8c0','#f4c77c','#d4956a','#b0713a','#7a4420','#4a2510'];
const HAIRS   = ['#f8e060','#e0a030','#b06020','#7a3a10','#3a1808','#1a1010','#aabbcc','#e88090','#60c0a0','#8060d0'];
const OUTFITS = ['#c82038','#2850d8','#208040','#c0a020','#b040b0','#1888a0','#d05018','#182858','#e8e8f0','#181818'];
const NATIONS = [
  {code:'USA',flag:'🇺🇸'},{code:'CAN',flag:'🇨🇦'},{code:'RUS',flag:'🇷🇺'},
  {code:'JPN',flag:'🇯🇵'},{code:'CHN',flag:'🇨🇳'},{code:'KOR',flag:'🇰🇷'},
  {code:'FRA',flag:'🇫🇷'},{code:'GER',flag:'🇩🇪'},{code:'ITA',flag:'🇮🇹'},
  {code:'GBR',flag:'🇬🇧'},{code:'AUS',flag:'🇦🇺'},{code:'SWE',flag:'🇸🇪'},
  {code:'FIN',flag:'🇫🇮'},{code:'NOR',flag:'🇳🇴'},{code:'ESP',flag:'🇪🇸'},
];
const MF=['ALEX','RYAN','JAKE','COLE','MAX','LUCAS','DEREK','EVAN','KYLE','SEAN'];
const FF=['EMMA','AVA','LILY','ZOE','CHLOE','MADISON','SOPHIA','OLIVIA','GRACE','KATE'];
const LN=['FROST','SNOW','WINTERS','ICE','STEELE','BLAKE','CROSS','STONE','WADE','BROOKS'];

let sk={gender:'male',skin:2,hair:4,outfit:0,nation:'USA',nationFlag:'🇺🇸'};

// Nations select
NATIONS.forEach(n=>{
  const o=document.createElement('option');
  o.value=n.code; o.textContent=`${n.flag} ${n.code}`;
  document.getElementById('nationSelect').appendChild(o);
});
function onNation(){
  sk.nation=document.getElementById('nationSelect').value;
  sk.nationFlag=NATIONS.find(x=>x.code===sk.nation)?.flag||'🏳';
}

// Swatches
function buildSw(id,arr,key){
  const el=document.getElementById(id); el.innerHTML='';
  arr.forEach((c,i)=>{
    const s=document.createElement('div'); s.className='swatch'+(sk[key]===i?' active':'');
    s.style.background=c;
    s.addEventListener('click',()=>{ sk[key]=i; el.querySelectorAll('.swatch').forEach((x,j)=>x.classList.toggle('active',j===i)); renderPreview(); });
    el.appendChild(s);
  });
}
function buildAll(){ buildSw('skinSw',SKINS,'skin'); buildSw('hairSw',HAIRS,'hair'); buildSw('outfitSw',OUTFITS,'outfit'); }

function setGender(g){
  sk.gender=g;
  document.getElementById('btnMale').classList.toggle('active',g==='male');
  document.getElementById('btnFemale').classList.toggle('active',g==='female');
  renderPreview();
}

function randomize(){
  const g=Math.random()<0.5?'male':'female'; sk.gender=g;
  sk.skin=Math.floor(Math.random()*SKINS.length);
  sk.hair=Math.floor(Math.random()*HAIRS.length);
  sk.outfit=Math.floor(Math.random()*OUTFITS.length);
  const nat=NATIONS[Math.floor(Math.random()*NATIONS.length)];
  sk.nation=nat.code; sk.nationFlag=nat.flag;
  document.getElementById('firstName').value=(g==='male'?MF:FF)[Math.floor(Math.random()*10)];
  document.getElementById('lastName').value=LN[Math.floor(Math.random()*LN.length)];
  document.getElementById('nationSelect').value=nat.code;
  document.getElementById('btnMale').classList.toggle('active',g==='male');
  document.getElementById('btnFemale').classList.toggle('active',g==='female');
  buildAll(); renderPreview();
}

// ── Preview renderer — same quality as title skater ──────
const pc=document.getElementById('previewCanvas');
const px=pc.getContext('2d');
px.imageSmoothingEnabled=false;

function r(x,y,w,h,col,a){ if(a!==undefined) px.globalAlpha=a; px.fillStyle=col; px.fillRect(Math.round(x),Math.round(y),w,h); px.globalAlpha=1; }

function renderPreview(){
  px.clearRect(0,0,80,110);
  const skin  =SKINS[sk.skin], skinSh=darken(skin,0.7), skinHi=lighten(skin,1.2);
  const hair  =HAIRS[sk.hair], hairDk=darken(hair,0.65);
  const outfit=OUTFITS[sk.outfit], outHi=lighten(outfit,1.3), outSh=darken(outfit,0.7);
  const female=sk.gender==='female';

  // shadow
  px.globalAlpha=0.3; px.fillStyle='rgba(40,120,10,0.4)';
  px.beginPath(); px.ellipse(40,107,16,4,0,0,Math.PI*2); px.fill(); px.globalAlpha=1;

  // blades
  r(14,103,16,2,'#c0d8f4'); r(50,103,16,2,'#c0d8f4');
  r(14,103,10,1,'rgba(255,255,255,0.75)'); r(50,103,10,1,'rgba(255,255,255,0.75)');
  // boots
  r(13,94,16,10,'#e8e8f2'); r(49,94,16,10,'#e8e8f2');
  r(13,94,16,3,'rgba(255,255,255,0.5)'); r(49,94,16,3,'rgba(255,255,255,0.5)');
  r(27,94,3,10,'rgba(0,0,0,0.14)'); r(63,94,3,10,'rgba(0,0,0,0.14)');

  if(female){
    // tights
    r(14,75,15,21,darken('#9090b8',0.8)); r(51,75,15,21,'#9090b8');
    r(14,75,5,10,'rgba(255,255,255,0.1)');
    // skirt
    r(10,66,60,12,outfit); r(10,66,60,4,outHi,0.5); r(10,74,60,4,outSh,0.45);
    r(10,76,60,2,'rgba(255,255,255,0.15)');
  } else {
    // trousers
    r(14,72,15,24,'#182058'); r(51,72,15,24,'#101440');
    r(14,72,6,12,'rgba(255,255,255,0.1)');
    // belt detail
    r(14,72,52,3,'rgba(0,0,0,0.25)');
  }

  // torso
  r(18,42,44,female?26:32,outfit);
  r(18,42,44,7,outHi,0.4); r(18,42,14,female?26:32,outHi,0.2); r(48,42,14,female?26:32,outSh,0.35);
  // collar
  r(32,42,16,5,outSh);

  // arms
  r(5,46,13,8,outfit); r(5,46,13,3,outHi,0.3); // left upper
  r(2,52,8,7,outfit);  // left forearm
  r(0,52,8,8,'#f0f0f4'); r(0,52,8,2,'rgba(255,255,255,0.5)'); // left glove
  r(62,46,13,8,outSh); r(68,52,8,7,outSh); // right upper/forearm
  r(68,52,8,8,'#f0f0f4'); // right glove

  // neck
  r(36,38,8,6,skin); r(36,38,8,2,skinHi,0.3);

  // head
  const hx=29, hy=16;
  r(hx,hy,22,22,skin);
  r(hx,hy,22,6,skinSh,0.28); r(hx+2,hy+5,9,10,skinHi,0.32);
  r(hx+14,hy+2,8,22,skinSh,0.28); r(hx,hy+16,22,6,skinSh,0.2);

  // eyes
  r(hx+3,hy+6,5,5,'#1a0a08'); r(hx+4,hy+7,3,3,'#2850a0'); r(hx+5,hy+7,1,2,'#000');
  r(hx+3,hy+6,2,1,'rgba(255,255,255,0.8)'); r(hx+3,hy+5,5,1,'rgba(0,0,0,0.5)');
  r(hx+14,hy+6,5,5,'#1a0a08'); r(hx+15,hy+7,3,3,'#2850a0'); r(hx+16,hy+7,1,2,'#000');
  r(hx+14,hy+6,2,1,'rgba(255,255,255,0.8)'); r(hx+14,hy+5,5,1,'rgba(0,0,0,0.5)');

  // nose
  r(hx+9,hy+12,5,4,skinSh,0.5);
  // mouth
  r(hx+5,hy+17,12,3,'#a04030',0.7); r(hx+6,hy+16,10,1,'#d06050',0.45);

  // hair
  r(hx-2,hy+3,4,18,hair); r(hx+20,hy+3,4,20,hairDk);
  r(hx,hy-4,22,7,hair); r(hx,hy,22,6,hair); r(hx+2,hy+3,7,4,hairDk,0.5);
  r(hx+4,hy-3,12,3,'rgba(255,255,255,0.12)');
  if(female){ r(hx+18,hy+2,6,22,hair); r(hx+20,hy+10,4,16,hairDk); r(hx+22,hy+20,3,10,hair,0.7); }
}

// Color helpers
function darken(hex,f){ const c=hexRgb(hex); return `rgb(${Math.round(c[0]*f)},${Math.round(c[1]*f)},${Math.round(c[2]*f)})`; }
function lighten(hex,f){ const c=hexRgb(hex); return `rgb(${Math.min(255,Math.round(c[0]*f))},${Math.min(255,Math.round(c[1]*f))},${Math.min(255,Math.round(c[2]*f))})`; }
function hexRgb(h){ const n=parseInt(h.replace('#',''),16); return [(n>>16)&255,(n>>8)&255,n&255]; }

function startCareer(){
  const fn=document.getElementById('firstName').value.trim().toUpperCase()||'ALEX';
  const ln=document.getElementById('lastName').value.trim().toUpperCase()||'FROST';
  const slot=parseInt(sessionStorage.getItem('activeSlot')||'1');
  SaveSystem.newSave(slot,{firstName:fn,lastName:ln,nation:sk.nation,nationFlag:sk.nationFlag,gender:sk.gender,skin:sk.skin,hair:sk.hair,outfit:sk.outfit});
  location.href='game.html';
}

buildAll(); renderPreview();
</script>
</body>
</html>
