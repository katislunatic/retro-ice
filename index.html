<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: #3a9818; overflow: hidden; }

.halftone {
  position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1.5px, transparent 1.5px);
  background-size: 11px 11px; pointer-events: none;
}
.vignette {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.48) 100%);
  pointer-events: none;
}
.bg-icons {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.bg-icons span {
  position: absolute; color: rgba(255,255,255,0.055);
  font-family: serif; user-select: none; line-height: 1;
}

/* ─── PERFECTLY CENTERED 3-column layout ─── */
.screen {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(24px, 4.5vw, 72px);
}

/* Skater col */
.col-skater {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center;
}
#skaterCanvas {
  image-rendering: pixelated;
  width: clamp(100px, 14vw, 180px);
  height: auto;
  filter: drop-shadow(3px 8px 0 rgba(0,0,0,0.5));
}

/* Logo col */
.col-logo {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center;
}
.logo-badge {
  width: clamp(210px, 27vw, 320px);
  height: clamp(210px, 27vw, 320px);
  filter: drop-shadow(0 0 28px rgba(255,255,255,0.25));
}
.logo-badge svg { width: 100%; height: 100%; }

/* Menu col */
.col-menu {
  flex: 0 0 auto;
  display: flex; flex-direction: column;
  align-items: stretch; gap: 12px;
  width: clamp(210px, 22vw, 290px);
}

/* PLAY button — RST style */
.play-outer {
  background: rgba(0,0,0,0.22);
  border: 3px solid rgba(255,255,255,0.35);
  box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  padding: 4px;
}
.play-btn {
  width: 100%;
  background: linear-gradient(180deg, #d4a010 0%, #a87800 100%);
  border: 3px solid rgba(255,255,255,0.88);
  box-shadow: 0 6px 0 #5e4000;
  color: #f8e040;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 2.1vw, 20px);
  letter-spacing: 4px;
  padding: 15px 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  transition: background 0.07s;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.55);
}
.play-btn:hover  { background: linear-gradient(180deg, #eac020 0%, #c09010 100%); }
.play-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 #5e4000; }

/* Sub-buttons */
.sub-row { display: flex; gap: 10px; }
.sub-btn {
  flex: 1;
  background: rgba(18,62,6,0.75);
  border: 3px solid rgba(255,255,255,0.72);
  box-shadow: 0 4px 0 rgba(0,0,0,0.4);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 0.9vw, 9px);
  letter-spacing: 1px;
  padding: 10px 6px;
  cursor: pointer; text-align: center;
  transition: background 0.07s;
}
.sub-btn:hover  { background: rgba(38,90,14,0.9); }
.sub-btn:active { transform: translateY(3px); }

/* Info box */
.info-box {
  display: none;
  background: rgba(8,36,2,0.94);
  border: 3px solid rgba(255,255,255,0.7);
  box-shadow: 0 5px 0 rgba(0,0,0,0.45);
  padding: 14px 16px;
}
.info-box.open { display: block; }
.info-box p { font-family: 'Press Start 2P', monospace; font-size: clamp(5px, 0.75vw, 7px); color: #c8e8b0; line-height: 2.4; }
.info-box b  { color: #f8e040; }

.copyright {
  position: fixed; bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(4px, 0.55vw, 5px);
  color: rgba(255,255,255,0.28); letter-spacing: 2px; z-index: 2;
}

/* Sparkle particles */
.sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.sparkles i {
  position: absolute; font-style: normal; font-family: serif;
  animation: sparkF linear infinite; opacity: 0;
}
@keyframes sparkF {
  0%  { opacity:0; transform: translateY(0) scale(1); }
  10% { opacity:1; }
  90% { opacity:0.6; }
  100%{ opacity:0; transform: translateY(-65px) scale(0.2); }
}
</style>
</head>

<script>
// ── Background icons ──────────────────────────────────
const bgEl = document.getElementById('bgIcons');
[
  [4,7,60],[12,65,48],[22,30,52],[35,12,44],[48,78,56],[58,42,40],
  [70,18,64],[80,58,48],[90,38,44],[96,82,52],[6,88,40],[26,52,60],
  [44,20,44],[64,70,52],[82,90,36],[18,45,48],[54,6,56],[76,38,44],
].forEach(([x,y,sz],i)=>{
  const s=document.createElement('span');
  s.textContent=['❄','★','❅','✦','❆','⛸'][i%6];
  s.style.cssText=`left:${x}%;top:${y}%;font-size:${sz}px;transform:rotate(${i*23}deg)`;
  bgEl.appendChild(s);
});

// ── Sparkles ──────────────────────────────────────────
const spEl=document.getElementById('sparkles');
for(let i=0;i<20;i++){
  const s=document.createElement('i');
  s.textContent=['❄','★','·','✦'][i%4];
  s.style.cssText=`left:${Math.random()*100}%;bottom:${12+Math.random()*68}%;
    animation-duration:${2.5+Math.random()*5}s;
    animation-delay:${Math.random()*5}s;
    color:rgba(255,255,255,${0.18+Math.random()*0.5});
    font-size:${5+Math.floor(Math.random()*9)}px`;
  spEl.appendChild(s);
}

// ════════════════════════════════════════════════════════
//  HIGH-QUALITY PIXEL SKATER  —  96×128 canvas
//  Inspired by Retro Slam Tennis character quality:
//  detailed shading, limb proportions, dynamic pose
// ════════════════════════════════════════════════════════
const cv = document.getElementById('skaterCanvas');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;

const C = {
  skin:   '#e8a870', skinSh:'#c07840', skinHi:'#f4c898',
  hair:   '#5a2808', hairDk:'#3a1404', hairHi:'rgba(255,255,255,0.12)',
  top:    '#c82038', topHi:'#e84060',  topSh:'#901020',
  pants:  '#182058', pantsSh:'#0e1438',
  boot:   '#e8e8f2', bootSh:'#b0b0c8', bootHi:'rgba(255,255,255,0.5)',
  blade:  '#c0d8f8', bladeHi:'rgba(255,255,255,0.8)',
  glove:  '#f0f0f4', gloveSh:'#c8c8d0',
  shade: 'rgba(0,0,0,0.28)', hi:'rgba(255,255,255,0.22)',
};

function r(x,y,w,h,col,a){
  if(a!==undefined) cx.globalAlpha=a;
  cx.fillStyle=col;
  cx.fillRect(Math.round(x),Math.round(y),w,h);
  cx.globalAlpha=1;
}

let frame=0;
function drawSkater(){
  cx.clearRect(0,0,96,128);

  const glide = Math.sin(frame*0.022)*3.5;
  const bob   = Math.sin(frame*0.038)*1.8;
  const swing = Math.sin(frame*0.045)*5;   // leg swing
  const armS  = Math.sin(frame*0.032)*6;   // arm swing
  const lean  = Math.sin(frame*0.022)*1.5; // body lean px

  // Center point
  const ox = 48+glide;
  const oy = 108+bob; // floor

  // Ice trail
  for(let i=6;i>=0;i--){
    r(ox-20+i*6, oy+2, 14, 2, '#a8d8f4', (1-i/7)*0.22);
  }
  // Ground shadow
  cx.globalAlpha=0.3; cx.fillStyle='rgba(0,60,0,0.4)';
  cx.beginPath(); cx.ellipse(ox,oy+5,18,4,0,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;

  // ── BACK LEG ──────────────────────────────────────
  const blx=ox+2+swing*0.7, bly=oy-22;
  // back boot
  r(blx-6,  oy-8,  13,9, C.bootSh);
  r(blx-6,  oy-8,  13,3, C.bootHi,0.35);
  // back blade
  r(blx-7,  oy+1,  15,2, C.blade);
  r(blx-7,  oy+1,  9, 1, C.bladeHi,0.6);
  // back leg (tights)
  r(blx-6,  bly,   12,16, C.pantsSh);
  r(blx-6,  bly,   4, 8,  C.hi,0.08);

  // ── FRONT LEG ─────────────────────────────────────
  const flx=ox-4-swing*0.7, fly=oy-22;
  // front boot
  r(flx-5,  oy-8,  13,9, C.boot);
  r(flx-5,  oy-8,  13,3, C.bootHi,0.55);
  r(flx+5,  oy-8,  4, 9, C.bootSh,0.45);
  // front blade
  r(flx-6,  oy+1,  15,2, C.blade);
  r(flx-6,  oy+1,  10,1, C.bladeHi,0.8);
  // front leg (tights)
  r(flx-5,  fly,   12,16, C.pants);
  r(flx-5,  fly,   5, 8,  C.hi,0.14); // highlight
  r(flx+5,  fly,   4, 16, C.pantsSh,0.4); // shadow

  // ── SKIRT ─────────────────────────────────────────
  const skirty = oy-32;
  r(ox-18+lean, skirty,    36,12, C.top);
  r(ox-18+lean, skirty,    36,4,  C.topHi,0.6);
  r(ox-18+lean, skirty+8,  36,4,  C.topSh,0.5);
  r(ox-18+lean, skirty+10, 36,2, 'rgba(255,255,255,0.18)');
  // skirt side shadow
  r(ox+14+lean, skirty,    4, 12, C.topSh,0.45);

  // ── TORSO ─────────────────────────────────────────
  const ty = oy-62;
  r(ox-12+lean, ty,    24,32, C.top);
  // light side
  r(ox-12+lean, ty,    8, 32, C.topHi,0.25);
  // dark side
  r(ox+6+lean,  ty,    6, 32, C.topSh,0.38);
  // top edge catch-light
  r(ox-10+lean, ty,    18,3,  C.hi,0.3);
  // collar
  r(ox-5+lean,  ty,    10,4,  C.topSh);

  // ── LEFT ARM (forward) ────────────────────────────
  const lax = ox-22+lean, lay = ty+4-armS;
  // upper arm
  r(lax,    lay,   10,7, C.top);
  r(lax,    lay,   10,2, C.topHi,0.3);
  r(lax,    lay+4, 10,3, C.topSh,0.35);
  // forearm
  r(lax-7,  lay+3, 9, 5, C.top);
  // glove
  r(lax-13, lay+3, 8, 7, C.glove);
  r(lax-13, lay+3, 8, 2, 'rgba(255,255,255,0.55)');
  r(lax-13, lay+8, 8, 2, C.gloveSh,0.5);

  // ── RIGHT ARM (back) ──────────────────────────────
  const rax = ox+12+lean, ray = ty+4+armS;
  r(rax,    ray,   10,7, C.topSh);
  r(rax,    ray,   10,2, C.top,0.5);
  r(rax+7,  ray+3, 9, 5, C.topSh);
  r(rax+14, ray+3, 7, 7, C.glove);
  r(rax+14, ray+3, 7, 2, 'rgba(255,255,255,0.45)');

  // ── NECK ─────────────────────────────────────────
  const nx=ox-4+lean*0.5, ny=ty-6;
  r(nx,  ny,   8, 7, C.skin);
  r(nx,  ny,   8, 3, C.skinHi,0.3);
  r(nx+5,ny,   3, 7, C.skinSh,0.3);

  // ── HEAD ─────────────────────────────────────────
  const hx=ox-12+lean*0.4, hy=ty-24, hw=24, hh=24;
  // head shape
  r(hx,    hy,    hw,  hh,  C.skin);
  // face shading zones
  r(hx,    hy,    hw,  6,   C.skinSh,0.3); // forehead shadow
  r(hx+2,  hy+6,  9,  10,  C.skinHi,0.35); // cheek highlight
  r(hx+16, hy+2,  8,  hh,  C.skinSh,0.32); // right face shadow
  r(hx,    hy+18, hw,  6,  C.skinSh,0.22); // jaw shadow

  // ── EYES ──────────────────────────────────────────
  // left eye
  r(hx+4,  hy+7,  5,5, '#1a0a08');
  r(hx+5,  hy+8,  3,3, '#2850a0'); // iris
  r(hx+6,  hy+8,  1,2, '#000');    // pupil
  r(hx+4,  hy+7,  2,1, 'rgba(255,255,255,0.8)'); // shine
  r(hx+4,  hy+6,  5,1, 'rgba(0,0,0,0.55)'); // lash
  // right eye
  r(hx+15, hy+7,  5,5, '#1a0a08');
  r(hx+16, hy+8,  3,3, '#2850a0');
  r(hx+17, hy+8,  1,2, '#000');
  r(hx+15, hy+7,  2,1, 'rgba(255,255,255,0.8)');
  r(hx+15, hy+6,  5,1, 'rgba(0,0,0,0.55)');

  // ── NOSE ──────────────────────────────────────────
  r(hx+10, hy+13, 5,4, C.skinSh,0.5);
  r(hx+10, hy+15, 5,2, C.skinSh,0.35);

  // ── MOUTH ──────────────────────────────────────────
  r(hx+6,  hy+18, 12,3, '#a04030',0.72);
  r(hx+7,  hy+17, 10,1, '#d06050',0.5);

  // ── HAIR ──────────────────────────────────────────
  // back/sides
  r(hx-2,  hy+2,  4,  20, C.hair);
  r(hx+22, hy+2,  4,  20, C.hairDk);
  // top
  r(hx,    hy-5,  hw, 7,  C.hair);
  // fringe/bangs
  r(hx,    hy,    hw, 6,  C.hair);
  r(hx+2,  hy+4,  7,  4,  C.hairDk,0.55);
  r(hx+4,  hy-4,  12, 3,  C.hairHi,1);  // hair shine
  // ponytail
  r(hx+20, hy+2,  6,  22, C.hair);
  r(hx+22, hy+10, 4,  18, C.hairDk);
  r(hx+24, hy+20, 3,  10, C.hair,0.7);

  frame++;
}

(function loop(){ drawSkater(); requestAnimationFrame(loop); })();

// ── Info toggles ──────────────────────────────────────
const INFO = {
  controls:`<b>KEYBOARD</b><br>← → · SKATE<br>Z · JUMP<br>X · SPIN<br>SPACE · POSE<br><br><b>COMBOS</b><br>Z→X · AXEL (900)<br>X→Z · LUTZ (750)<br>Z→SPC · SALCHOW (650)<br>SPC→X · TOE LOOP (550)`,
  about:   `<b>RETRO ICE</b><br>FIGURE SKATING<br>CAREER GAME.<br><br>EARN MEDALS &amp;<br>BUILD YOUR LEGACY!<br><br><b>VERSION 1.0</b>`
};
let openKey='';
function toggleInfo(k){
  const box=document.getElementById('infoBox');
  if(openKey===k){box.classList.remove('open');openKey='';return;}
  document.getElementById('infoText').innerHTML=INFO[k];
  box.classList.add('open'); openKey=k;
}
document.addEventListener('click',e=>{
  const box=document.getElementById('infoBox');
  if(!box.contains(e.target)&&!e.target.closest('.sub-btn')){box.classList.remove('open');openKey='';}
});
</script>
</body>
</html>
