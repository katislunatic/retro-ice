<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background:#0a1020; }

.title-page {
  width:100vw; height:100vh;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:0;
  position:relative;
  overflow:hidden;
}

/* Ice rink bg */
.rink-bg-full {
  position:fixed; inset:0;
  background:linear-gradient(180deg,
    #08111e 0%,
    #0d1c36 20%,
    #1a3050 28%,
    #c0eaf8 28%,
    #d8f4ff 55%,
    #b0e0f2 100%
  );
  z-index:-2;
}
/* Rink lines */
.rink-bg-full::before {
  content:'';
  position:absolute;
  left:0;right:0;
  top:28%;height:72%;
  background:
    radial-gradient(ellipse 300px 80px at 50% 40%, rgba(130,210,240,0.18) 0%, transparent 80%),
    repeating-linear-gradient(0deg, transparent 0, transparent 38px, rgba(120,200,230,0.1) 38px, rgba(120,200,230,0.1) 40px);
}
/* Crowd dots */
.rink-bg-full::after {
  content:'';
  position:absolute;
  left:0;right:0;top:0;height:28%;
  background:
    repeating-linear-gradient(90deg,
      #c04868 0px, #c04868 10px,
      #1a3060 10px, #1a3060 22px,
      #38a848 22px, #38a848 32px,
      #c09030 32px, #c09030 44px,
      #703080 44px, #703080 54px,
      #c04868 54px
    );
  opacity:0.35;
  mask-image:repeating-linear-gradient(180deg,
    rgba(0,0,0,0.5) 0px, rgba(0,0,0,0.5) 8px,
    transparent 8px, transparent 16px
  );
}

/* ── LEFT: decorative skater art area ── */
.left-art {
  flex:0 0 38%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── CENTER: logo ── */
.logo-area {
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}

/* Circular logo badge - like Retro Slam Tennis */
.logo-badge {
  position:relative;
  width:clamp(180px, 22vw, 280px);
  height:clamp(180px, 22vw, 280px);
}
.logo-badge svg {
  width:100%;height:100%;
  filter: drop-shadow(0 0 20px rgba(74,200,240,0.5));
}

/* ── RIGHT: menu area ── */
.right-menu {
  flex:0 0 38%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:0 40px;
}

.game-subtitle {
  font-size:clamp(6px,1vw,8px);
  color:var(--ice-light);
  letter-spacing:3px;
  text-align:center;
  margin-bottom:4px;
}

.menu-btn {
  width:100%;
  max-width:280px;
}

.copyright {
  position:absolute;
  bottom:10px; right:16px;
  font-size:5px;
  color:rgba(74,200,240,0.4);
  letter-spacing:1px;
}

/* Skater pixel art on left */
#artCanvas {
  image-rendering:pixelated;
  filter:drop-shadow(4px 4px 0 rgba(0,30,60,0.5));
}

/* Sparkle animation */
@keyframes sparkleFloat {
  0%   { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-60px) scale(0.4); opacity:0; }
}
.sparkle-cont {
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.sparkle-cont span {
  position:absolute;
  bottom:30%;
  font-size:10px;
  animation: sparkleFloat linear infinite;
  color:#fff;
}

@keyframes rotateBadge {
  from{transform:rotate(0deg)} to{transform:rotate(360deg)}
}
</style>
</head>
<body>
<div class="rink-bg-full"></div>

<div class="title-page fadeup">

  <!-- LEFT art panel -->
  <div class="left-art">
    <div class="sparkle-cont" id="sparkles"></div>
    <canvas id="artCanvas" width="120" height="160" style="width:clamp(90px,12vw,150px);height:auto"></canvas>
  </div>

  <!-- CENTER logo -->
  <div class="logo-area">
    <div class="logo-badge pulse">
      <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="topArc"   d="M 50,140 a90,90 0 0,1 180,0"/>
          <path id="botArc"   d="M 230,140 a90,90 0 0,1 -180,0"/>
        </defs>
        <!-- Outer ring -->
        <circle cx="140" cy="140" r="130" fill="#0d2a4a" stroke="#4ac8f0" stroke-width="4"/>
        <circle cx="140" cy="140" r="118" fill="none"    stroke="#1a4a7a" stroke-width="2"/>
        <!-- Ice rink inner disc -->
        <circle cx="140" cy="140" r="100" fill="url(#iceGrad)"/>
        <defs>
          <radialGradient id="iceGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%"   stop-color="#d8f4ff"/>
            <stop offset="60%"  stop-color="#a8dcf0"/>
            <stop offset="100%" stop-color="#70b8d8"/>
          </radialGradient>
        </defs>
        <!-- Center circle on ice -->
        <circle cx="140" cy="140" r="40" fill="none" stroke="rgba(100,180,220,0.5)" stroke-width="2"/>
        <line x1="90" y1="140" x2="190" y2="140" stroke="rgba(100,180,220,0.4)" stroke-width="1.5"/>
        <line x1="140" y1="90" x2="140" y2="190" stroke="rgba(100,180,220,0.4)" stroke-width="1.5"/>
        <!-- Pixel skater silhouette on badge -->
        <g transform="translate(115,105)" style="image-rendering:pixelated">
          <!-- body -->
          <rect x="10" y="20" width="12" height="14" fill="#e03050"/>
          <!-- head -->
          <rect x="11" y="12" width="10" height="9"  fill="#f4c77c"/>
          <!-- hair -->
          <rect x="11" y="10" width="10" height="4"  fill="#3a1a08"/>
          <!-- legs -->
          <rect x="9"  y="34" width="5"  height="8"  fill="#1a2a4a"/>
          <rect x="16" y="34" width="5"  height="8"  fill="#1a2a4a"/>
          <!-- boots -->
          <rect x="8"  y="42" width="7"  height="3"  fill="#fff"/>
          <rect x="15" y="42" width="7"  height="3"  fill="#fff"/>
          <!-- blades -->
          <rect x="7"  y="45" width="9"  height="1"  fill="#c0d8f0"/>
          <rect x="14" y="45" width="9"  height="1"  fill="#c0d8f0"/>
          <!-- arms extended -->
          <rect x="1"  y="22" width="9"  height="3"  fill="#e03050"/>
          <rect x="22" y="22" width="9"  height="3"  fill="#e03050"/>
        </g>
        <!-- Snowflakes -->
        <text x="80"  y="80"  font-size="12" fill="rgba(255,255,255,0.5)" font-family="serif">❄</text>
        <text x="178" y="75"  font-size="10" fill="rgba(255,255,255,0.4)" font-family="serif">❄</text>
        <text x="175" y="195" font-size="9"  fill="rgba(255,255,255,0.35)" font-family="serif">❄</text>
        <text x="82"  y="198" font-size="11" fill="rgba(255,255,255,0.4)" font-family="serif">❄</text>
        <!-- Curved top text -->
        <text font-family="'Press Start 2P', monospace" font-size="15" fill="#ffffff" letter-spacing="3"
              text-anchor="middle">
          <textPath href="#topArc" startOffset="50%">RETRO ICE</textPath>
        </text>
        <!-- Curved bottom text -->
        <text font-family="'Press Start 2P', monospace" font-size="13" fill="#4ac8f0" letter-spacing="2"
              text-anchor="middle">
          <textPath href="#botArc" startOffset="50%">FIGURE SKATING</textPath>
        </text>
        <!-- Border stars -->
        <text x="125" y="32"  font-size="10" fill="#ffd700" font-family="serif">★</text>
        <text x="140" y="26"  font-size="8"  fill="#ffffff" font-family="serif">★</text>
        <text x="155" y="32"  font-size="10" fill="#ffd700" font-family="serif">★</text>
      </svg>
    </div>
  </div>

  <!-- RIGHT menu -->
  <div class="right-menu">
    <p class="game-subtitle">❄ THE RETRO SKATING EXPERIENCE ❄</p>

    <button class="btn btn-gold btn-lg menu-btn" onclick="location.href='career.html'">
      ▶ &nbsp;PLAY
    </button>

    <div style="display:flex;gap:10px;width:100%;max-width:280px">
      <button class="btn btn-sm" style="flex:1" onclick="showControls()">CONTROLS</button>
      <button class="btn btn-sm" style="flex:1" onclick="showAbout()">ABOUT</button>
    </div>

    <!-- Controls hint -->
    <div id="infoBox" style="display:none;max-width:280px;width:100%">
      <div class="panel" style="padding:14px">
        <p class="section-title" id="infoTitle">CONTROLS</p>
        <div id="infoContent" style="font-size:6px;color:#aaa;line-height:2.2;text-align:left"></div>
      </div>
    </div>
  </div>

  <div class="copyright">© RETRO ICE · ALL RIGHTS RESERVED</div>
</div>

<script src="js/save.js"></script>
<script>
// ── Sparkles ──────────────────────────────────────────
const sc = document.getElementById('sparkles');
for(let i=0;i<12;i++){
  const s = document.createElement('span');
  s.textContent = ['❄','★','·','✦','*'][Math.floor(Math.random()*5)];
  s.style.cssText = `
    left:${10+Math.random()*80}%;
    animation-duration:${2+Math.random()*4}s;
    animation-delay:${Math.random()*3}s;
    opacity:${0.3+Math.random()*0.6};
    font-size:${6+Math.floor(Math.random()*10)}px;
    color:${['#fff','#4ac8f0','#ffd700'][Math.floor(Math.random()*3)]};
  `;
  sc.appendChild(s);
}

// ── Pixel skater art ──────────────────────────────────
const ac = document.getElementById('artCanvas');
const ax = ac.getContext('2d');
ax.imageSmoothingEnabled = false;

function drawArtSkater(t) {
  ax.clearRect(0,0,120,160);
  const glide = Math.sin(t*0.002)*3;

  // Ice trail
  ax.fillStyle='rgba(180,230,255,0.3)';
  for(let i=0;i<5;i++){
    ax.fillRect(30+i*8, 128, 12, 2);
  }

  // Shadow
  ax.fillStyle='rgba(30,80,120,0.2)';
  ax.fillRect(38+glide, 128, 44, 5);

  // Skirt / pants
  ax.fillStyle='#1a2a4a';
  ax.fillRect(44+glide,106,32,20);
  // Body coat
  ax.fillStyle='#e03050';
  ax.fillRect(42+glide,74,36,34);
  // Head
  ax.fillStyle='#f4c77c';
  ax.fillRect(50+glide,54,22,22);
  // Hair
  ax.fillStyle='#3a1a08';
  ax.fillRect(50+glide,50,22,10);
  // Arms (arabesque pose)
  ax.fillStyle='#e03050';
  ax.fillRect(18+glide,80,24,8);
  ax.fillRect(78+glide,80,24,8);
  // Gloves
  ax.fillStyle='#fff';
  ax.fillRect(14+glide,80,6,6);
  ax.fillRect(100+glide,80,6,6);
  // Extended leg (arabesque)
  const legAngle = Math.sin(t*0.003)*6;
  ax.fillStyle='#1a2a4a';
  ax.fillRect(62+glide,118,40,10);
  // Standing leg
  ax.fillRect(44+glide,118,16,18);
  // Boots
  ax.fillStyle='#f0f0f8';
  ax.fillRect(42+glide,130,18,8);
  ax.fillRect(60+glide,124,14,6);
  // Blades
  ax.fillStyle='rgba(200,230,255,0.9)';
  ax.fillRect(40+glide,138,22,2);
  ax.fillRect(58+glide,130,18,2);

  // Sparkles
  const sp = [[-14,-20],[+20,-28],[-8,-35],[+16,-12]];
  sp.forEach(([dx,dy],i)=>{
    const a = Math.sin(t*0.004+i)*0.8+0.2;
    ax.globalAlpha=a;
    ax.fillStyle=['#fff','#ffd700','#4ac8f0','#fff'][i];
    ax.fillRect(60+glide+dx,90+dy,4,4);
    ax.fillRect(60+glide+dx+2,90+dy-2,2,2);
  });
  ax.globalAlpha=1;
}

let artT=0;
function animArt(){
  artT++;
  drawArtSkater(artT);
  requestAnimationFrame(animArt);
}
animArt();

// ── Info boxes ───────────────────────────────────────
const CONTROLS_HTML = `
  <b style="color:#4ac8f0">KEYBOARD</b><br>
  ← → &nbsp;· Skate<br>
  Z &nbsp;&nbsp;&nbsp;&nbsp;· Jump<br>
  X &nbsp;&nbsp;&nbsp;&nbsp;· Spin<br>
  SPACE · Pose<br><br>
  <b style="color:#4ac8f0">COMBOS</b><br>
  Z+X &nbsp;· Axel &nbsp;(800pts)<br>
  X+Z &nbsp;· Lutz &nbsp;(700pts)<br>
  Z+SP· Salchow (600pts)<br>
  X &nbsp;&nbsp;&nbsp;· Spin &nbsp;(400pts)<br>
  SP &nbsp;· Spiral (300pts)<br>
  Z &nbsp;&nbsp;&nbsp;· Jump &nbsp;(200pts)<br><br>
  <b style="color:#ffd700">COMBOS multiply score!</b>
`;

const ABOUT_HTML = `
  <b style="color:#4ac8f0">RETRO ICE</b><br>
  A figure skating game<br>
  inspired by retro classics.<br><br>
  Compete in events, earn<br>
  medals &amp; build your career!<br><br>
  <b style="color:#ffd700">Version 1.0</b>
`;

let infoOpen = '';
function showControls(){
  if(infoOpen==='controls'){
    document.getElementById('infoBox').style.display='none';
    infoOpen=''; return;
  }
  document.getElementById('infoTitle').textContent='CONTROLS';
  document.getElementById('infoContent').innerHTML=CONTROLS_HTML;
  document.getElementById('infoBox').style.display='block';
  infoOpen='controls';
}
function showAbout(){
  if(infoOpen==='about'){
    document.getElementById('infoBox').style.display='none';
    infoOpen=''; return;
  }
  document.getElementById('infoTitle').textContent='ABOUT';
  document.getElementById('infoContent').innerHTML=ABOUT_HTML;
  document.getElementById('infoBox').style.display='block';
  infoOpen='about';
}
</script>
</body>
</html>
