<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── GREEN BG with halftone dots, exactly like RST ── */
body {
  background: #4aaa20;
  overflow: hidden;
}

.halftone {
  position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, rgba(0,0,0,0.14) 1.5px, transparent 1.5px);
  background-size: 12px 12px;
  pointer-events: none;
}

/* Subtle vignette like RST */
.vignette {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 40%,
    rgba(0,0,0,0.35) 100%
  );
  pointer-events: none;
}

/* Snowflake/star shapes in bg like RST tennis ball ghosts */
.bg-deco {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-deco span {
  position: absolute;
  color: rgba(255,255,255,0.07);
  font-family: serif;
  font-size: 60px;
  user-select: none;
}

/* ── LAYOUT: portrait-friendly landscape ── */
.title-wrap {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(20px, 4vw, 60px);
}

/* ── LEFT / RIGHT decorative space ── */
.side-space { flex: 1; }

/* ── LOGO CENTER ── */
.logo-center {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.logo-ring {
  position: relative;
  width: clamp(200px, 26vw, 320px);
  height: clamp(200px, 26vw, 320px);
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.3));
}
.logo-ring svg { width: 100%; height: 100%; }

/* ── MENU RIGHT ── */
.menu-col {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 14px;
  min-width: clamp(180px, 22vw, 280px);
}

/* Big PLAY button exactly like RST */
.play-wrap {
  background: rgba(0,0,0,0.15);
  border: 3px solid rgba(255,255,255,0.3);
  box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  padding: 4px;
}

.play-btn {
  width: 100%;
  background: #b08000;
  border: 3px solid rgba(255,255,255,0.85);
  box-shadow: 0 5px 0 #6a4800;
  color: #f8d030;
  font-family: var(--font);
  font-size: clamp(14px, 2.2vw, 20px);
  letter-spacing: 3px;
  padding: 14px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: background 0.07s;
}
.play-btn:hover  { background: #c89010; }
.play-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #6a4800; }

/* Smaller sub-buttons row like RST */
.sub-btns {
  display: flex;
  gap: 10px;
}
.sub-btn {
  flex: 1;
  background: rgba(40,100,20,0.7);
  border: 3px solid rgba(255,255,255,0.7);
  box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  color: #fff;
  font-family: var(--font);
  font-size: clamp(6px, 1vw, 9px);
  letter-spacing: 1px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: center;
  transition: background 0.07s;
}
.sub-btn:hover  { background: rgba(60,130,30,0.85); }
.sub-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); }

/* Info popup — like RST's minimal style */
.info-popup {
  background: rgba(20,60,10,0.92);
  border: 3px solid rgba(255,255,255,0.75);
  box-shadow: 0 5px 0 rgba(0,0,0,0.4);
  padding: 14px 16px;
  display: none;
}
.info-popup.show { display: block; }
.info-popup p { font-size: clamp(5px, 0.8vw, 7px); color: #cce; line-height: 2.2; }
.info-popup b  { color: #f8d030; }

/* Copyright like RST */
.copyright {
  position: fixed;
  bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-size: clamp(4px, 0.6vw, 6px);
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
  z-index: 2;
}

/* Skating figure animation on left */
.skater-showcase {
  flex: 0 0 auto;
  position: relative;
  width: clamp(100px, 12vw, 160px);
  height: clamp(140px, 16vw, 200px);
}
#showcaseCanvas {
  image-rendering: pixelated;
  width: 100%; height: 100%;
}

/* Sparkle particles */
.sparkle-layer {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.sparkle-layer i {
  position: absolute;
  font-style: normal;
  animation: sparkleF linear infinite;
  color: rgba(255,255,255,0.6);
  font-size: 8px;
  font-family: serif;
}
</style>
</head>
<body>

<!-- Background layers -->
<div class="halftone"></div>
<div class="vignette"></div>
<div class="bg-deco" id="bgDeco"></div>
<div class="sparkle-layer" id="sparkleLayer"></div>

<div class="title-wrap fadein">

  <!-- Animated skater left -->
  <div class="skater-showcase">
    <canvas id="showcaseCanvas" width="80" height="110"></canvas>
  </div>

  <!-- Big logo badge center -->
  <div class="logo-center">
    <div class="logo-ring pulse">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="iceGrad" cx="50%" cy="38%" r="55%">
            <stop offset="0%"   stop-color="#e8f8ff"/>
            <stop offset="50%"  stop-color="#c0e8f8"/>
            <stop offset="100%" stop-color="#88c8e8"/>
          </radialGradient>
          <path id="arcTop" d="M 35,150 a115,115 0 0,1 230,0"/>
          <path id="arcBot" d="M 265,150 a115,115 0 0,1 -230,0"/>
        </defs>

        <!-- Outer glow ring -->
        <circle cx="150" cy="150" r="145" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
        <!-- Dark outer band -->
        <circle cx="150" cy="150" r="140" fill="#1a4a1a" stroke="rgba(255,255,255,0.85)" stroke-width="5"/>
        <!-- Inner ring border -->
        <circle cx="150" cy="150" r="124" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
        <!-- Ice disc -->
        <circle cx="150" cy="150" r="118" fill="url(#iceGrad)"/>

        <!-- Rink markings -->
        <circle cx="150" cy="150" r="52" fill="none" stroke="rgba(100,170,210,0.45)" stroke-width="2.5"/>
        <line x1="60" y1="150" x2="240" y2="150" stroke="rgba(100,170,210,0.4)" stroke-width="2"/>
        <line x1="150" y1="60" x2="150" y2="240" stroke="rgba(100,170,210,0.4)" stroke-width="2"/>
        <!-- Center dot -->
        <circle cx="150" cy="150" r="5" fill="rgba(200,50,70,0.6)"/>

        <!-- Pixel skater on badge -->
        <g transform="translate(126,116)">
          <!-- skirt/pants -->
          <rect x="8"  y="22" width="12" height="9"  fill="#e03050"/>
          <!-- legs -->
          <rect x="7"  y="31" width="5"  height="7"  fill="#1a2050"/>
          <rect x="14" y="31" width="5"  height="7"  fill="#1a2050"/>
          <!-- body -->
          <rect x="7"  y="10" width="14" height="13" fill="#e03050"/>
          <!-- arms -->
          <rect x="0"  y="12" width="7"  height="3"  fill="#e03050"/>
          <rect x="21" y="12" width="7"  height="3"  fill="#e03050"/>
          <!-- head -->
          <rect x="9"  y="2"  width="10" height="9"  fill="#f4c77c"/>
          <!-- hair -->
          <rect x="9"  y="0"  width="10" height="4"  fill="#3a1808"/>
          <!-- boots -->
          <rect x="6"  y="38" width="7"  height="3"  fill="#f0f0f8"/>
          <rect x="14" y="38" width="7"  height="3"  fill="#f0f0f8"/>
          <!-- blades -->
          <rect x="5"  y="41" width="9"  height="1"  fill="rgba(200,230,255,0.9)"/>
          <rect x="13" y="41" width="9"  height="1"  fill="rgba(200,230,255,0.9)"/>
          <!-- sparkles -->
          <rect x="-8" y="6"  width="3" height="3"  fill="#fff" opacity="0.7"/>
          <rect x="33" y="4"  width="3" height="3"  fill="#fff" opacity="0.7"/>
          <rect x="-4" y="15" width="2" height="2"  fill="#ffd700" opacity="0.8"/>
          <rect x="30" y="16" width="2" height="2"  fill="#ffd700" opacity="0.8"/>
        </g>

        <!-- Snowflakes on ice disc -->
        <text x="85"  y="96"  font-size="14" fill="rgba(255,255,255,0.4)" font-family="serif">❄</text>
        <text x="192" y="90"  font-size="11" fill="rgba(255,255,255,0.35)" font-family="serif">❄</text>
        <text x="190" y="210" font-size="12" fill="rgba(255,255,255,0.3)" font-family="serif">❄</text>
        <text x="84"  y="212" font-size="10" fill="rgba(255,255,255,0.35)" font-family="serif">❄</text>

        <!-- Stars at top like RST -->
        <text x="130" y="38" font-size="11" fill="#ffd700" font-family="serif">★</text>
        <text x="145" y="30" font-size="9"  fill="#ffffff" font-family="serif">★</text>
        <text x="159" y="38" font-size="11" fill="#ffd700" font-family="serif">★</text>

        <!-- Curved TOP text: RETRO ICE -->
        <text font-family="'Press Start 2P',monospace" font-size="16" fill="#ffffff"
              letter-spacing="4" text-anchor="middle"
              style="text-shadow:1px 1px 0 rgba(0,0,0,0.5)">
          <textPath href="#arcTop" startOffset="50%">RETRO ICE</textPath>
        </text>
        <!-- Curved BOTTOM text: FIGURE SKATING -->
        <text font-family="'Press Start 2P',monospace" font-size="12" fill="rgba(255,255,255,0.9)"
              letter-spacing="2" text-anchor="middle">
          <textPath href="#arcBot" startOffset="50%">FIGURE SKATING</textPath>
        </text>
      </svg>
    </div>
  </div>

  <!-- Menu right -->
  <div class="menu-col">
    <!-- PLAY button in a container like RST -->
    <div class="play-wrap">
      <button class="play-btn" onclick="location.href='career.html'">
        PLAY &nbsp; <span style="font-size:0.75em">⛸</span>
      </button>
    </div>

    <!-- Sub buttons -->
    <div class="sub-btns">
      <button class="sub-btn" onclick="toggleInfo('controls')">CONTROLS</button>
      <button class="sub-btn" onclick="toggleInfo('about')">ABOUT</button>
    </div>

    <!-- Info box -->
    <div class="info-popup" id="infoPopup">
      <p id="infoText"></p>
    </div>
  </div>

  <div class="side-space"></div>
</div>

<div class="copyright">COPYRIGHT 2025 RETRO ICE · ALL RIGHTS RESERVED.</div>

<script src="js/save.js"></script>
<script>
// Background deco snowflakes/stars like RST's tennis ball ghosts
const deco = document.getElementById('bgDeco');
const decoSymbols = ['❄','★','❅','✦','❆'];
const decoPos = [
  [5,8],[15,70],[25,35],[40,15],[55,80],[65,45],[75,20],[85,60],[92,40],[10,90],[45,55],[80,85]
];
decoPos.forEach(([x,y],i)=>{
  const s = document.createElement('span');
  s.textContent = decoSymbols[i%decoSymbols.length];
  s.style.cssText = `left:${x}%;top:${y}%;font-size:${40+Math.random()*40}px;transform:rotate(${Math.random()*360}deg)`;
  deco.appendChild(s);
});

// Sparkle particles
const sl = document.getElementById('sparkleLayer');
for(let i=0;i<16;i++){
  const s=document.createElement('i');
  s.textContent=['❄','★','·','✦'][i%4];
  s.style.cssText=`left:${Math.random()*100}%;bottom:${20+Math.random()*60}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*4}s;color:rgba(255,255,255,${0.2+Math.random()*0.5});font-size:${5+Math.floor(Math.random()*9)}px`;
  sl.appendChild(s);
}

// Showcase canvas — bigger, more detailed skater
const sc = document.getElementById('showcaseCanvas');
const sx = sc.getContext('2d');
sx.imageSmoothingEnabled = false;
let t = 0;

function drawShowcase(){
  sx.clearRect(0,0,80,110);
  const glide = Math.sin(t*0.025)*2;
  const bob   = Math.sin(t*0.04)*1.5;
  const armL  = Math.sin(t*0.03)*3;

  // ice trail
  sx.fillStyle='rgba(200,240,255,0.35)';
  for(let i=0;i<6;i++) sx.fillRect(14+i*9, 96, 8, 2);

  // shadow
  sx.fillStyle='rgba(50,150,50,0.25)';
  sx.fillRect(20+glide, 97, 40, 6);

  const x = 40+glide, y = 86+bob;

  // legs alternate
  sx.fillStyle='#1a2050';
  const loff = Math.sin(t*0.05)*3;
  sx.fillRect(x-10+loff, y-8, 8, 12);
  sx.fillRect(x+2-loff,  y-8, 8, 12);

  // skirt
  sx.fillStyle='#e03050';
  sx.fillRect(x-11, y-16, 22, 9);

  // body
  sx.fillStyle='#e03050';
  sx.fillRect(x-9, y-30, 18, 15);

  // arms
  sx.fillStyle='#e03050';
  sx.fillRect(x-18, y-28+armL, 9, 5);
  sx.fillRect(x+9,  y-28-armL, 9, 5);
  sx.fillStyle='#fff';
  sx.fillRect(x-21, y-28+armL, 4, 4);
  sx.fillRect(x+17, y-28-armL, 4, 4);

  // head
  sx.fillStyle='#f4c77c';
  sx.fillRect(x-7, y-42, 14, 13);
  // hair
  sx.fillStyle='#3a1808';
  sx.fillRect(x-7, y-45, 14, 6);
  sx.fillRect(x+7, y-40, 3, 12);
  // eyes
  sx.fillStyle='rgba(0,0,0,0.75)';
  sx.fillRect(x-4, y-38, 3, 3);
  sx.fillRect(x+2, y-38, 3, 3);

  // boots
  sx.fillStyle='#f0f0f8';
  sx.fillRect(x-12+loff, y+4, 9, 5);
  sx.fillRect(x+3-loff,  y+4, 9, 5);
  // blades
  sx.fillStyle='rgba(180,220,255,0.9)';
  sx.fillRect(x-13+loff, y+9, 11, 1);
  sx.fillRect(x+2-loff,  y+9, 11, 1);

  // sparkles
  const sparkles = [[-18,-32,1],[18,-30,0],[-12,-18,0],[20,-16,1]];
  sparkles.forEach(([dx,dy,phase],i)=>{
    const a=Math.sin(t*0.04+i*1.2+phase)*0.5+0.5;
    sx.globalAlpha=a*0.8;
    sx.fillStyle=['#fff','#ffd700','#88eeff','#fff'][i];
    sx.fillRect(x+dx, y+dy, 3, 3);
    if(a>0.6){ sx.fillRect(x+dx+1, y+dy-2, 2, 2); }
  });
  sx.globalAlpha=1;

  t++;
  requestAnimationFrame(drawShowcase);
}
drawShowcase();

// Info toggles
let openInfo = '';
const INFO = {
  controls: `<b>KEYBOARD</b><br>← → &nbsp;· SKATE<br>Z &nbsp;&nbsp;&nbsp;&nbsp;· JUMP<br>X &nbsp;&nbsp;&nbsp;&nbsp;· SPIN<br>SPACE · POSE<br><br><b>COMBOS</b><br>Z→X · AXEL &nbsp;(900)<br>X→Z · LUTZ &nbsp;(750)<br>Z→SP · SALCHOW (650)<br>X→SP · TOE LOOP (550)`,
  about: `<b>RETRO ICE</b><br>A FIGURE SKATING<br>CAREER GAME.<br><br>COMPETE · EARN MEDALS<br>BUILD YOUR LEGACY!<br><br><b>VERSION 1.0</b>`
};
function toggleInfo(k){
  const box = document.getElementById('infoPopup');
  if(openInfo===k){ box.classList.remove('show'); openInfo=''; return; }
  document.getElementById('infoText').innerHTML = INFO[k];
  box.classList.add('show');
  openInfo = k;
}
document.addEventListener('click', e=>{
  const box = document.getElementById('infoPopup');
  if(!box.contains(e.target) && !e.target.closest('.sub-btn')){
    box.classList.remove('show'); openInfo='';
  }
});
</script>
</body>
</html>
