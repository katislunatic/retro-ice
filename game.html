<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice – Skate!</title>
<link rel="stylesheet" href="css/style.css">
<style>
html, body { overflow:hidden; background:#0a0a0a; }

.game-page {
  position:relative; width:100vw; height:100vh;
  display:flex; flex-direction:column;
}

/* HUD — Retro Bowl dark bar style */
#hud {
  flex:0 0 auto; height:44px;
  background:#0a0a10;
  border-bottom:3px solid #fff;
  display:flex; align-items:center;
  padding:0 16px; gap:clamp(8px,2vw,28px);
  z-index:20;
  box-shadow:0 2px 0 rgba(0,0,0,0.5);
}
.hb { display:flex;flex-direction:column;gap:2px; }
.hl { font-size:clamp(4px,0.6vw,5px); color:rgba(255,255,255,0.45); letter-spacing:2px; }
.hv { font-size:clamp(9px,1.4vw,12px); color:#fff; }
.hv-gold  { color:#f0c030!important; }
.hv-red   { color:#ff7080!important; }
.hv-blue  { color:#80c0ff!important; }
.h-sep    { flex:1; }
.h-name   { font-size:clamp(5px,0.85vw,7px); color:rgba(200,220,255,0.7); letter-spacing:1px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Canvas */
#gameCanvas {
  flex:1 1 auto;
  width:100%;
  height:calc(100vh - 44px - 32px);
  display:block;
  image-rendering:pixelated;
}

/* Controls bar */
#ctrlBar {
  flex:0 0 auto; height:32px;
  background:#0a0a10;
  border-top:2px solid rgba(255,255,255,0.2);
  display:flex; align-items:center;
  justify-content:center; gap:clamp(6px,2vw,24px);
  padding:0 14px;
}
.ch { font-size:clamp(4px,0.65vw,5px); color:rgba(255,255,255,0.3); letter-spacing:1px; }
.ch span { color:#f0c030; }
.ch.tip  { color:rgba(100,200,255,0.5); }

/* Pause overlay */
#pauseOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.78); z-index:100;
  align-items:center; justify-content:center;
}
#pauseOverlay.show { display:flex; }
.pause-box {
  background:var(--rb-panel);
  border:4px solid #fff;
  box-shadow:0 8px 0 var(--rb-btn-sh), 4px 4px 0 rgba(0,0,0,0.5);
  padding:28px 36px; text-align:center; min-width:220px;
}
.pause-box h3 { font-size:clamp(10px,1.6vw,13px); color:#fff; margin-bottom:20px; letter-spacing:3px; }
.pause-btns { display:flex; flex-direction:column; gap:10px; }
</style>
</head>
<body>
<div class="game-page">
  <div id="hud">
    <div class="hb">
      <div class="hl">SKATER</div>
      <div class="hv h-name" id="hudName">—</div>
    </div>
    <div class="h-sep"></div>
    <div class="hb">
      <div class="hl">SCORE</div>
      <div class="hv" id="hudScore">0</div>
    </div>
    <div class="hb">
      <div class="hl">COMBO</div>
      <div class="hv hv-gold" id="hudCombo">x1</div>
    </div>
    <div class="hb">
      <div class="hl">TIME</div>
      <div class="hv hv-red" id="hudTime">90</div>
    </div>
    <div class="hb">
      <div class="hl">LEVEL</div>
      <div class="hv hv-blue" id="hudLevel">1</div>
    </div>
    <div class="h-sep"></div>
    <button class="rb-btn rb-btn-sm" onclick="togglePause()" style="height:28px;padding:0 12px;font-size:6px">☰ MENU</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="ctrlBar">
    <span class="ch"><span>← →</span> SKATE</span>
    <span class="ch"><span>Z</span> JUMP</span>
    <span class="ch"><span>X</span> SPIN</span>
    <span class="ch"><span>SPACE</span> POSE</span>
    <span class="ch"><span>ESC</span> PAUSE</span>
    <span class="ch tip">CHAIN MOVES FOR COMBOS!</span>
  </div>
</div>

<div id="pauseOverlay">
  <div class="pause-box">
    <h3>PAUSED</h3>
    <div class="pause-btns">
      <button class="rb-btn rb-btn-lg" onclick="togglePause()">▶ RESUME</button>
      <button class="rb-btn"           onclick="location.href='career.html'">⬅ CAREER</button>
      <button class="rb-btn"           onclick="location.href='index.html'">🏠 TITLE</button>
    </div>
  </div>
</div>

<script src="js/save.js"></script>
<script src="js/game.js"></script>
<script>
let paused = false;
function togglePause(){
  paused = !paused;
  document.getElementById('pauseOverlay').classList.toggle('show', paused);
}
document.addEventListener('keydown', e=>{ if(e.code==='Escape') togglePause(); });
</script>
</body>
</html>
