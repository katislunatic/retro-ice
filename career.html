<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Retro Ice – Career</title>
<link rel="stylesheet" href="css/style.css">
<style>
.rink-bg-full {
  position:fixed;inset:0;
  background:linear-gradient(180deg,#08111e 0%,#0d1c36 20%,#1a3050 28%,#c0eaf8 28%,#d8f4ff 55%,#b0e0f2 100%);
  z-index:-2;
}
.rink-bg-full::after{
  content:'';position:absolute;left:0;right:0;top:0;height:28%;
  background:repeating-linear-gradient(90deg,
    #c04868 0px,#c04868 10px,#1a3060 10px,#1a3060 22px,
    #38a848 22px,#38a848 32px,#c09030 32px,#c09030 44px,
    #703080 44px,#703080 54px,#c04868 54px);
  opacity:0.35;
  mask-image:repeating-linear-gradient(180deg,rgba(0,0,0,0.5) 0px,rgba(0,0,0,0.5) 8px,transparent 8px,transparent 16px);
}

.career-page {
  width:100vw;height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  padding:20px;
}

.logo-sm {
  flex:0 0 auto;
  width:clamp(110px,14vw,170px);
}
.logo-sm svg { width:100%;height:auto;filter:drop-shadow(0 0 12px rgba(74,200,240,0.4)); }

.slots-col {
  flex:1;
  max-width:500px;
  min-width:280px;
}

.header-row {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}
.back-btn {
  width:36px;height:36px;
  padding:0;
  font-size:12px;
  flex-shrink:0;
}
.header-row h2 {
  font-size:clamp(9px,1.6vw,13px);
  color:#fff;
  text-shadow:2px 2px 0 var(--ice-dark);
  flex:1;
}
.stars {
  display:flex;gap:4px;font-size:10px;
}

.slot-block { margin-bottom:16px; }
.slot-label {
  font-size:clamp(5px,0.8vw,7px);
  color:var(--text-acc);
  letter-spacing:2px;
  margin-bottom:5px;
}
.slot-row {
  display:flex;
  align-items:stretch;
  gap:8px;
}
.slot-main {
  flex:1;
  min-height:52px;
  text-align:left;
  padding:10px 14px;
  line-height:1.6;
}
.slot-del {
  width:40px;height:40px;padding:0;
  align-self:center;
}

.slot-name { font-size:clamp(8px,1.3vw,11px); color:#fff; }
.slot-info { font-size:clamp(5px,0.8vw,6px); color:var(--ice-light); margin-top:3px; }

.version-tag {
  position:absolute;
  bottom:10px;right:16px;
  font-size:5px;
  color:rgba(74,200,240,0.3);
}

/* Confirm overlay */
#confirmOverlay {
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  z-index:100;
  align-items:center;
  justify-content:center;
}
#confirmOverlay.show { display:flex; }
#confirmBox {
  text-align:center;
  padding:28px 32px;
  min-width:260px;
}
#confirmBox p {
  font-size:clamp(8px,1.4vw,10px);
  color:#fff;margin-bottom:18px;
  line-height:2;
}
</style>
</head>
<body>
<div class="rink-bg-full"></div>

<div class="career-page fadeup">

  <!-- Small logo on left -->
  <div class="logo-sm">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" fill="#0d2a4a" stroke="#4ac8f0" stroke-width="3"/>
      <circle cx="100" cy="100" r="75" fill="url(#ig2)"/>
      <defs>
        <radialGradient id="ig2" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#d8f4ff"/>
          <stop offset="100%" stop-color="#70b8d8"/>
        </radialGradient>
      </defs>
      <circle cx="100" cy="100" r="28" fill="none" stroke="rgba(100,180,220,0.4)" stroke-width="1.5"/>
      <line x1="60" y1="100" x2="140" y2="100" stroke="rgba(100,180,220,0.35)" stroke-width="1.5"/>
      <line x1="100" y1="60"  x2="100" y2="140" stroke="rgba(100,180,220,0.35)" stroke-width="1.5"/>
      <g transform="translate(78,70)">
        <rect x="10" y="20" width="9" height="10" fill="#e03050"/>
        <rect x="11" y="12" width="7" height="9"  fill="#f4c77c"/>
        <rect x="11" y="10" width="7" height="3"  fill="#3a1a08"/>
        <rect x="7"  y="30" width="4" height="7"  fill="#1a2a4a"/>
        <rect x="13" y="30" width="4" height="7"  fill="#1a2a4a"/>
        <rect x="6"  y="37" width="5" height="2"  fill="#fff"/>
        <rect x="13" y="37" width="5" height="2"  fill="#fff"/>
        <rect x="0"  y="21" width="8" height="2"  fill="#e03050"/>
        <rect x="21" y="21" width="8" height="2"  fill="#e03050"/>
      </g>
      <defs>
        <path id="ta2" d="M 30,100 a70,70 0 0,1 140,0"/>
        <path id="ba2" d="M 170,100 a70,70 0 0,1 -140,0"/>
      </defs>
      <text font-family="'Press Start 2P',monospace" font-size="11" fill="#fff" letter-spacing="2" text-anchor="middle">
        <textPath href="#ta2" startOffset="50%">RETRO ICE</textPath>
      </text>
      <text font-family="'Press Start 2P',monospace" font-size="9" fill="#4ac8f0" letter-spacing="1" text-anchor="middle">
        <textPath href="#ba2" startOffset="50%">SKATING</textPath>
      </text>
    </svg>
  </div>

  <!-- Slots -->
  <div class="slots-col">
    <div class="header-row">
      <button class="btn back-btn" onclick="location.href='index.html'">◀</button>
      <div class="stars">
        <span class="star-r">★</span>
        <span class="star-w">★</span>
        <span class="star-b">★</span>
      </div>
      <h2>CAREER</h2>
      <div class="stars">
        <span class="star-b">★</span>
        <span class="star-w">★</span>
        <span class="star-r">★</span>
      </div>
    </div>

    <div id="slotsContainer"></div>
  </div>
</div>

<!-- Confirm delete overlay -->
<div id="confirmOverlay">
  <div class="panel" id="confirmBox">
    <p>DELETE THIS SAVE?<br><span style="color:#ff6080;font-size:clamp(7px,1vw,8px)">THIS CANNOT BE UNDONE!</span></p>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-danger" id="confirmYes">DELETE</button>
      <button class="btn" id="confirmNo">CANCEL</button>
    </div>
  </div>
</div>

<div class="version-tag">v1.0</div>

<script src="js/save.js"></script>
<script>
function renderSlots(){
  const slots = SaveSystem.allSlots();
  const cont = document.getElementById('slotsContainer');
  cont.innerHTML = '';

  slots.forEach(({slot, data}) => {
    const block = document.createElement('div');
    block.className = 'slot-block';

    const label = document.createElement('div');
    label.className = 'slot-label';
    label.textContent = `SLOT ${slot}`;

    const row = document.createElement('div');
    row.className = 'slot-row';

    const mainBtn = document.createElement('button');
    mainBtn.className = 'btn slot-main';

    if(data){
      const sk = data.skater;
      const medals = data.medals || {gold:0,silver:0,bronze:0};
      mainBtn.innerHTML = `
        <div class="slot-name">${sk.firstName.toUpperCase()} ${sk.lastName.toUpperCase()}</div>
        <div class="slot-info">
          ${sk.nation || 'USA'} &nbsp;·&nbsp;
          Season ${data.season||1} &nbsp;·&nbsp;
          ${data.score||0} PTS &nbsp;·&nbsp;
          🥇${medals.gold||0} 🥈${medals.silver||0} 🥉${medals.bronze||0}
        </div>
      `;
      mainBtn.addEventListener('click', ()=>{
        sessionStorage.setItem('activeSlot', slot);
        location.href = 'game.html';
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger slot-del';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', ()=> confirmDelete(slot));
      row.appendChild(mainBtn);
      row.appendChild(delBtn);
    } else {
      mainBtn.innerHTML = `<div class="slot-name" style="color:var(--text-acc)">NEW CAREER</div>`;
      mainBtn.addEventListener('click', ()=>{
        sessionStorage.setItem('activeSlot', slot);
        location.href = 'create.html';
      });
      row.appendChild(mainBtn);
    }

    block.appendChild(label);
    block.appendChild(row);
    cont.appendChild(block);
  });
}

let deleteSlot = null;
function confirmDelete(slot){
  deleteSlot = slot;
  document.getElementById('confirmOverlay').classList.add('show');
}
document.getElementById('confirmYes').addEventListener('click', ()=>{
  if(deleteSlot) SaveSystem.del(deleteSlot);
  document.getElementById('confirmOverlay').classList.remove('show');
  deleteSlot = null;
  renderSlots();
});
document.getElementById('confirmNo').addEventListener('click', ()=>{
  document.getElementById('confirmOverlay').classList.remove('show');
  deleteSlot = null;
});

renderSlots();
</script>
</body>
</html>
